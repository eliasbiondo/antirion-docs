name: requirements

on:
  pull_request:
    paths:
      - 'docs/requirements/**'
      - 'tools/req/**'
      - '.github/workflows/requirements.yml'
  push:
    branches: [main]
    paths:
      - 'docs/requirements/**'
      - 'tools/req/**'
      - '.github/workflows/requirements.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/req/requirements.txt pytest
      - name: Validate requirements graph
        run: python tools/req/req.py validate
      - name: Run unit tests
        run: python -m pytest tools/req/tests -q
