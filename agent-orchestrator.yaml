port: 3000
defaults:
  runtime: tmux
  agent: claude-code
  workspace: worktree
  notifiers: []
projects:
  antirion:
    name: antirion
    sessionPrefix: ant
    repo: eliasbiondo/antirion-docs
    path: /home/biondoel/repos/bus/antirion
    defaultBranch: main
    agentRules: |-
      Always run tests before pushing.
      Use conventional commits (feat:, fix:, chore:, docs:, refactor:, test:).
      Link issue numbers in commit messages.
      Write clear commit messages that explain WHY, not just WHAT.
