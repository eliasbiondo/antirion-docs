    when:
    - I set upstream_rate_limit_rpm on the Model
    then:
    - The limiter enforces min(provider default, byok override, model override) per outbound call
  - id: AC-003
    scenario: Precedence
    given:
    - Provider default = 2000 rpm, BYOK override = 5000 rpm, Model override = 800 rpm
    when:
    - A request is attributed to that provider/credential/model
    then:
    - The effective ceiling is 800 rpm (most restrictive)
    - The UI shows each layer and highlights which one is binding
  api:
  - method: PUT
    path: /api/byok-credentials/:id/rate-limit
    request:
      body:
        rate_limit_rpm: int
        rate_limit_tpm: int
    response:
      credential: BYOKCredential
    errors:
    - 400
    - 401
    - 403
    - 404
    inferred: true
  - method: PUT
    path: /api/models/:id/upstream-rate-limit
    request:
      body:
        upstream_rate_limit_rpm: int
        upstream_rate_limit_tpm: int
    response:
      model: Model
    errors:
    - 400
    - 401
    - 403
    - 404
    inferred: true
  data_models:
  - BYOKCredential
  - Model
  - ProviderRateLimit
  - AuditLog
  non_functional:
  - Every phase (auth, translate, upstream, post-processing) has an explicit timeout; the pipeline is cancellation-safe
  - Additions to this phase must not breach the project performance_slo for gateway-added latency
  - Outbound limiter learns Retry-After within one request of receiving it and applies cluster-wide
- id: STORY-384
  feature: FEAT-161
  title: Pre-emptively throttle outbound calls against the effective ceiling
  narrative:
    as_a: gateway operator
    i_want: the outbound limiter to delay or reject calls before they hit the provider's 429 wall
    so_that: we keep headroom, avoid noisy retries, and expose accurate pressure
  priority: P0
  depends_on:
  - STORY-382
  - STORY-383
  acceptance_criteria:
  - id: AC-001
    scenario: Request admitted when under limit
    given:
    - The effective ceiling is 2000 rpm and the current window count is 1200
    when:
    - A request arrives
    then:
    - The limiter admits it and increments the ProviderRateLimitWindow counter atomically
    - No extra latency is added beyond O(ms)
  - id: AC-002
    scenario: Soft throttle near ceiling
    given:
    - The effective ceiling is 2000 rpm and the current window is at 95% utilization
    when:
    - A request arrives
    then:
    - The limiter queues the request up to a configurable max_delay_ms (default 250)
    - If headroom becomes available in time, the request is admitted
    - If not, the limiter falls through to the routing fallback chain (see FEAT-051)
  - id: AC-003
    scenario: Hard reject at ceiling
    given:
    - The ProviderRateLimitWindow is at 100% for rpm or tpm
    when:
    - A request arrives and fallback is exhausted
    then:
    - The gateway returns 429 with Retry-After set to window_remaining_seconds
    - antirion_ratelimit_rejections_total{source="outbound"} is incremented
    - The Request is recorded with status 429 and limit_source="outbound"
  - id: AC-004
    scenario: Honour provider 429 Retry-After as ground truth
    given:
    - A provider returns 429 with Retry-After=12
    when:
    - The limiter observes the response
    then:
    - The effective ceiling for that credential is temporarily lowered for 12 seconds
    - The ProviderRateLimitWindow is marked "provider_cooldown_until" and subsequent calls honour it
    - An AuditLog entry records action "provider.rate_limit.cooldown_observed"
  api:
  - method: GET
    path: /api/providers/:id/rate-limit/window
    response:
      window: ProviderRateLimitWindow
    errors:
    - 401
    - 403
    - 404
    inferred: true
  data_models:
  - ProviderRateLimit
  - ProviderRateLimitWindow
  - Request
  - AuditLog
  non_functional:
  - Window counters use a 60s sliding window with 1s buckets and are stored in Redis with per-bucket TTL
  - Counter updates are atomic (INCR + EXPIRE) to avoid double-counting under concurrency
- id: STORY-385
  feature: FEAT-161
  title: Render provider rate-limit pressure on the overview
  narrative:
    as_a: platform engineer watching the gateway
    i_want: a pressure gauge per provider and per BYOK credential
    so_that: I can see at a glance whether we are about to be rate-limited upstream
  priority: P0
  depends_on:
  - STORY-382
  - STORY-384
  acceptance_criteria:
  - id: AC-001
