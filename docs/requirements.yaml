  - Cardinality is bounded by limiting labels to the set above
- id: STORY-340
  feature: FEAT-143
  title: In-app trace viewer and sampling configuration
  narrative:
    as_a: platform engineer
    i_want: an in-product trace waterfall for a given request id and a UI to configure sampling
    so_that: I do not need to leave the product to debug request latency
  priority: P1
  depends_on:
  - STORY-338
  acceptance_criteria:
  - id: AC-001
    scenario: Waterfall for a request id
    given:
    - A Request row has an OTel trace id
    when:
    - I click "View trace"
    then:
    - I see a waterfall with spans (translate, outbound call, retry, stream) and their durations
  - id: AC-002
    scenario: Configure sampling
    given:
    - I am an admin
    when:
