    so_that: I keep my account
  priority: P1
  depends_on:
  - STORY-046
  acceptance_criteria:
  - id: AC-001
    scenario: Cancel within grace window
    given:
    - I have an AccountDeletionRequest with status "pending"
    - scheduled_for is in the future
    when:
    - I click "Cancel deletion" on the security panel
    then:
    - The AccountDeletionRequest.status becomes "cancelled"
    - User.status returns to "active"
    - My tokens and keys are restored to "active"
    - An AuditLog entry with action "user.deletion.cancelled" is written
  ui:
    screens:
    - Account
    components:
    - SecurityPanel
    - Banner
    states:
    - pending
    - cancelled
  api:
  - method: DELETE
    path: /api/account/deletion
    response:
      ok: bool
    errors:
    - 401
    - 409
    inferred: true
  data_models:
  - AccountDeletionRequest
  - User
  - AuditLog
  non_functional:
  - After scheduled_for elapses, cancellation is rejected and must go through support
