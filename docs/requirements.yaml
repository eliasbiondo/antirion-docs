- id: STORY-046
  feature: FEAT-020
  title: Request personal account deletion
  narrative:
    as_a: signed-in non-owner user
    i_want: to request deletion of my personal account with a grace window
    so_that: my data is removed and I can change my mind before cutover
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Submit deletion request
    given:
    - I am on /account/security
    - I am not the sole Org owner
    when:
    - I click "Delete my account"
    - I confirm with my password or MFA and check the consequences box
    then:
    - An AccountDeletionRequest is created with status "pending" and scheduled_for now + 30 days
    - The User.status becomes "pending_deletion"
    - My personal tokens are marked as rotating and will be revoked at cutover
    - A confirmation email is sent to me and to each workspace owner
  - id: AC-002
    scenario: Owner cannot self-delete while sole owner
    given:
    - I am the only User in my Org with role "owner"
    when:
    - I click "Delete my account"
    then:
    - I see "Assign another owner before deleting your account"
    - No AccountDeletionRequest is created
  ui:
    screens:
    - Account
    components:
    - SecurityPanel
    - ConfirmDialog
    states:
    - default
    - confirming
    - blocked
  api:
  - method: POST
    path: /api/account/deletion
    request:
      body:
        password: string
        mfa_code: string
    response:
      request_id: string
      scheduled_for: timestamp
    errors:
    - 401
    - 409
    inferred: true
  data_models:
  - AccountDeletionRequest
  - User
  - PersonalToken
  - AuditLog
