    - I click Save
    then:
    - A ProviderRateLimit row with scope "provider" is created or updated for anthropic
    - An AuditLog entry records action "provider.rate_limit.update" with old and new values
    - The change takes effect within 60 seconds across gateway nodes
  - id: AC-002
    scenario: Reject invalid limits
    given:
    - I am editing provider rate limits
    when:
    - I enter a negative value or set tpm below the highest model's per-request out_max
    then:
    - I see an inline validation error
    - No change is persisted
  - id: AC-003
    scenario: Zero means unlimited / unknown
    given:
    - A Provider has default_rate_limit_rpm=0
    when:
    - The outbound limiter evaluates a request
    then:
    - No pre-emptive throttle is applied for that provider
    - The overview shows "limits not configured" instead of a pressure gauge
  api:
  - method: PUT
    path: /api/providers/:id/rate-limit
    request:
      body:
        rate_limit_rpm: int
        rate_limit_tpm: int
    response:
      provider: Provider
      rate_limit: ProviderRateLimit
    errors:
    - 400
    - 401
    - 403
    - 404
    inferred: true
  data_models:
  - Provider
  - ProviderRateLimit
  - AuditLog
  non_functional:
  - Every phase (auth, translate, upstream, post-processing) has an explicit timeout; the pipeline is cancellation-safe
  - Additions to this phase must not breach the project performance_slo for gateway-added latency
  - Outbound limiter learns Retry-After within one request of receiving it and applies cluster-wide
- id: STORY-383
  feature: FEAT-161
  title: Override rate limits per BYOK credential and per model
  narrative:
    as_a: platform engineer
    i_want: to override rpm and tpm on a specific BYOKCredential or Model when my negotiated tier differs from the provider default
    so_that: the limiter tracks the correct ceiling for each outbound path
  priority: P0
  depends_on:
  - STORY-382
  acceptance_criteria:
  - id: AC-001
    scenario: Override at BYOK credential level
    given:
    - A BYOKCredential for anthropic has a negotiated 5000 rpm tier
    when:
    - I set rate_limit_rpm=5000 and rate_limit_tpm=1500000 on the credential
    then:
    - A ProviderRateLimit row with scope "byok" and target_id=credential.id is persisted
    - The outbound limiter uses this override instead of the provider default when this credential is selected
  - id: AC-002
    scenario: Override at model level
    given:
