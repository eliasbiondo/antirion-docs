      revoked_sessions: int
    errors:
    - 401
    - 403
    - 404
    inferred: true
  data_models:
  - User
  - Session
  - ApiKey
  - AuditLog
  non_functional:
  - Audit log entries are immutable
  - Offboarded users remain visible in the audit log forever
