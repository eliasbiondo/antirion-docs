- id: STORY-344
  feature: FEAT-147
  title: Enforce request and response size limits
  narrative:
    as_a: platform engineer
    i_want: configurable size limits at the edge
    so_that: a pathological payload cannot exhaust upstream cost or memory
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Over max prompt size
    given:
    - Org size policy has max_prompt_bytes = 1 MB
    when:
    - A request body exceeds 1 MB
    then:
    - The edge returns 413 Payload Too Large
    - No upstream call is made
    - A Request row is written with status 413
  - id: AC-002
    scenario: Over max response tokens
    given:
    - Org size policy caps max_output_tokens at 8192
    when:
    - A request asks for 32768 max_tokens
    then:
    - The gateway clamps to 8192 and sends a response header X-Antirion-MaxTokens-Clamped = 8192
  api:
  - method: POST
    path: /v1/chat/completions
    request:
      header:
        Content-Length: int
    errors:
    - 413
    - 422
  data_models:
  - Request
  - SizeLimitPolicy
  non_functional:
  - Size checks run before body parsing to avoid memory pressure
- id: STORY-345
  feature: FEAT-148
  title: Serve a graceful response when every upstream is unhealthy
  narrative:
    as_a: platform engineer
    i_want: configurable graceful degradation
    so_that: a provider-wide outage does not produce raw 5xx storms
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Cached response when configured
    given:
    - All providers for a route are open-circuit
    - The org has graceful degradation set to "serve-cached"
    - A matching CacheEntry exists for the request
    when:
    - The request is processed
    then:
    - The gateway returns the cached response with header X-Antirion-Degraded = true
    - Request.cached is true and Request.status is 200
  - id: AC-002
    scenario: Structured 503 fallback
    given:
    - No cached response exists
    - Graceful degradation is set to "structured-503"
    when:
    - The request is processed
    then:
    - The gateway returns 503 with a JSON body {error, retry_after_ms, affected_providers}
    - A metric antirion_graceful_degradation_total increments
  api:
  - method: POST
    path: /v1/chat/completions
    response:
      error: object
      retry_after_ms: int
    errors:
    - 503
  data_models:
  - Request
  - ProviderHealth
  - CacheEntry
  non_functional:
  - Every phase (auth, translate, upstream, post-processing) has an explicit timeout; the pipeline is cancellation-safe
  - Additions to this phase must not breach the project performance_slo for gateway-added latency
  - Outage-mode responses are served from cache or stub without any upstream call
- id: STORY-346
  feature: FEAT-148
  title: Dialect-specific error shape on graceful degradation
  narrative:
    as_a: client SDK
    i_want: the outage error to be shaped like the dialect I speak
    so_that: my SDK's error handler works unchanged
  priority: P0
  depends_on:
  - STORY-345
  acceptance_criteria:
  - id: AC-001
    scenario: OpenAI-style error
    given:
    - A client called /v1/chat/completions
    when:
    - Graceful degradation returns an outage response
    then:
    - The body matches OpenAI's error shape (error.code, error.type, error.message)
  - id: AC-002
    scenario: Anthropic-style error
    given:
    - A client called /v1/messages
    when:
    - Graceful degradation returns an outage response
    then:
    - The body matches Anthropic's error shape (type="error", error.type, error.message)
  - id: AC-003
    scenario: Antirion-native error
    given:
    - A client called the native Antirion endpoint
    when:
    - Graceful degradation returns an outage response
    then:
    - The body matches the native Antirion error shape with code, retryable, reason and trace_id
  data_models: []
  non_functional:
  - Every phase (auth, translate, upstream, post-processing) has an explicit timeout; the pipeline is cancellation-safe
  - Additions to this phase must not breach the project performance_slo for gateway-added latency
  - Outage-mode responses are served from cache or stub without any upstream call
- id: STORY-347
  feature: FEAT-149
  title: Configure trace sampling with error override
  narrative:
    as_a: SRE
    i_want: head-based and tail-based trace sampling with always-sample on error
    so_that: telemetry cost stays bounded without losing incident context
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Head-based sampling
    given:
    - Org sampling is head-based at 5%
    when:
