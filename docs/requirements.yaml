    when:
    - A client POSTs /v1/chat/completions with stream=true
    then:
    - The response is 200 with Content-Type "text/event-stream"
    - Each SSE event carries a chat.completion.chunk body
    - 'The stream ends with the SSE line "data: [DONE]" followed by a blank line'
    - The final TTFT, total latency, input/output tokens and cost are recorded on the Request after the stream ends
