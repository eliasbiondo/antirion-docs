- id: STORY-325
  feature: FEAT-138
  title: Enforce rate limits with Retry-After
  narrative:
    as_a: gateway
    i_want: to enforce per-key, per-team and per-org rate limits for rpm and tpm
    so_that: runaway clients do not starve the rest of the workspace
  priority: P0
  depends_on:
  - STORY-323
  acceptance_criteria:
  - id: AC-001
    scenario: Per-key rpm exceeded
    given:
    - An ApiKey with rate_limit_rpm 60 has used 60 requests in the current window
    when:
    - A 61st request arrives in the same window
    then:
    - The response is 429 with header Retry-After set to the remaining window seconds
    - The body is an OpenAI/Anthropic compatible rate_limit_error
  - id: AC-002
    scenario: Per-team tpm exceeded
    given:
    - A team's budget policy or rate limit caps tpm at 1,000,000
    when:
    - Cumulative tokens across the team's keys exceed that in the window
    then:
    - Further requests for that team return 429
    - Requests from other teams are unaffected
  - id: AC-003
    scenario: Headers on success
    given:
    - A successful request under limits
    when:
    - The response is produced
    then:
    - Headers X-RateLimit-Limit-Requests, X-RateLimit-Remaining-Requests and X-RateLimit-Reset-Requests are set
  data_models:
  - ApiKey
  - ApiAccessConfig
  - Team
  non_functional:
  - Distributed token-bucket backed by Redis; lock-free hot path (CRC-sharded)
  - Edge synchronization within 60 seconds of config changes
- id: STORY-326
  feature: FEAT-138
  title: Return standard rate-limit response headers
  narrative:
