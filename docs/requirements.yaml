- id: STORY-403
  feature: FEAT-170
  title: View fleet roster across gateway, control-plane and workers
  navigation: operator
  narrative:
    as_a: SRE or workspace owner
    i_want: a live roster of every replica across the gateway, control-plane API and worker fleets with version, region, AZ, state, CPU, in-flight count and stream count
    so_that: I can spot an unhealthy replica or a stuck rolling deploy before it affects traffic
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Fleet overview
    given:
    - I am on /settings/fleet
    when:
    - The page loads
    then:
    - I see a row per FleetReplica with fleet, version, region, AZ, state, cpu_pct, in_flight and active_streams
    - Replicas whose state is not "ready" are marked degraded
    - The header shows counts per fleet and an aggregate ready/total ratio
  - id: AC-002
    scenario: Filter the roster
    given:
    - The overview is loaded
    when:
    - I apply filters for fleet "gateway" and region "us-east-1"
    then:
    - Only matching replicas are shown
    - The header counts reflect the filtered set
  - id: AC-003
    scenario: Mid-deploy mixed versions
    given:
    - A rolling deploy is in progress and two versions are live
    when:
    - The page loads
    then:
    - Replicas on the older version show an "N-1" pill
    - A banner names the target version and the percentage of replicas migrated
  ui:
    screens:
    - Settings
    components:
    - FleetDashboard
    - FleetReplicaRow
    states:
    - ok
    - degraded
    - deploying
  api:
  - method: GET
    path: /api/fleet/replicas
    request:
      query:
        fleet: string
        region: string
        state: string
    response:
      items: FleetReplica[]
    errors:
    - 403
    inferred: true
