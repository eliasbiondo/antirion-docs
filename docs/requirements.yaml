- id: STORY-223
  feature: FEAT-099
  title: Create an alert rule
  narrative:
    as_a: platform engineer
    i_want: to create an alert rule with metric, operator, threshold, sustained duration and re-fire cooldown, and see a live preview of the condition before saving
    so_that: I get paged when things go wrong without flapping
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Create a p95 latency rule
    given:
    - I am on /alerts and click "Manage rules"
    when:
    - I click "New rule"
    - I fill name "Anthropic p95 latency regression", category "latency"
    - I pick severity "warn" from the radio set {info, warn, crit}
    - I set scope "provider:openai" using the scoped-entity picker
    - I set condition metric "p95_latency_ms", operator ">", threshold 1500
    - I set for_duration "5m" (sustained duration the condition must hold before firing)
    - I set cooldown "15m" (re-fire suppression window after a fire)
    - I pick channels [email, slack]
    - I click Create rule
    then:
    - An AlertRule is created with enabled=true and evaluated against live telemetry immediately on save
    - The rule list shows the new row with severity badge, scope chip and "last fired: never"
    - An AuditLog entry records actor and action "alert_rule.create"
  - id: AC-002
    scenario: Live preview string updates as I edit
    given:
    - I am in the New rule modal
    when:
    - I change any of name, scope, metric, operator, threshold, for_duration, severity or cooldown
    then:
    - The preview renders "when {scope}.{metric} {operator} {threshold} for {for_duration} → fire {severity}, cooldown {cooldown}"
    - Example shown below the form always reflects the current form state
  - id: AC-003
    scenario: Severity must be one of info, warn, crit
    given:
    - I am creating a rule
    when:
    - I submit without picking a severity
    then:
    - I see "Pick a severity" on the radio group
    - The rule is not saved
  - id: AC-004
    scenario: for_duration and window are distinct and validated
    given:
    - metric "p95_latency_ms" needs a window to compute the percentile
    when:
    - I leave window blank or set for_duration longer than cooldown
    then:
    - I see "Window is required for this metric" or "for_duration must be ≤ cooldown" inline
    - The rule is not saved
  - id: AC-005
    scenario: Scope format validated against known entities
    given:
    - I type scope "provider:openai"
    when:
    - I blur the field
    then:
    - The scope picker validates the provider id exists and resolves a chip
    - Invalid formats show "Scope must be one of provider:<id>, team:<id>, project:<id>, model:<slug>, key:<last4>"
  - id: AC-006
    scenario: Invalid threshold
    given:
    - I am creating a rule
    when:
    - I enter threshold 0 with operator ">"
    then:
    - I see "Threshold must be positive"
    - The rule is not saved
  - id: AC-007
    scenario: Rule evaluates immediately on save
    given:
    - Live telemetry already satisfies the condition at save time
    when:
    - I click Create rule
    then:
    - The first evaluation runs within 10 seconds of save
    - If the condition is already sustained for >= for_duration, an AlertEvent fires on the first evaluation tick
    - If not yet sustained, evaluation state is primed so the condition can fire as soon as for_duration elapses
  - id: AC-008
    scenario: Cancel returns to rule list without persisting
    given:
    - I have partially filled the form
    when:
    - I click Cancel
    then:
    - The modal closes and no AlertRule is persisted
  ui:
    screens:
    - Alerts
    components:
    - ManageRulesModal
    - NewRuleModal
    - SeverityRadio
    - ScopePicker
    - ConditionBuilder
    - RulePreview
    states:
    - default
    - submitting
    - invalid
    - preview_updating
  api:
  - method: POST
    path: /api/alert-rules
    request:
      body:
        name: string
        category: string
        scope: string
        metric: string
        operator: string
        threshold: number
        window: string
        for_duration: string
        cooldown: string
        severity: string
        channels:
        - string
    response:
      rule: AlertRule
    errors:
    - 400
    - 401
    - 403
    inferred: true
  - method: POST
    path: /api/alert-rules/preview
    request:
      body:
        scope: string
        metric: string
        operator: string
        threshold: number
        for_duration: string
        cooldown: string
        severity: string
    response:
      preview_string: string
      would_fire_now: bool
      current_value: number
    errors:
    - 400
    - 401
    - 403
    inferred: true
  data_models:
  - AlertRule
  - AuditLog
  ui_references:
  - proto/alerts.jsx
  non_functional:
  - Alert evaluation runs on a bounded interval; backlog or missed evaluations raise their own operational alert
  - Notification delivery is retried with exponential backoff by the worker fleet and deduped per rule-fire
