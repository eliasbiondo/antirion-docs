  - FleetReplica
  non_functional:
  - The fleet view is read-only and must not contribute to request-path load — it consumes the same heartbeat stream the load balancer uses
  - The roster is consistent within 10 seconds of a replica state change
- id: STORY-404
  feature: FEAT-170
  title: Drain and cordon a replica
  navigation: operator
  narrative:
    as_a: SRE
    i_want: to drain and cordon a specific replica
    so_that: I can safely take it out of rotation for investigation or a controlled rollout without dropping traffic
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Initiate a drain
    given:
    - A FleetReplica is in state "ready"
    when:
    - I click "Drain" on its row and confirm
    then:
    - The replica flips to state "draining" and stops accepting new requests
    - A live progress indicator shows in_flight and active_streams counting down
    - The action is written to the audit log with actor, target replica and reason
  - id: AC-002
    scenario: Drain completes within SLA
    given:
    - A replica is draining
    when:
    - in_flight and active_streams both reach zero before the graceful_shutdown timeout
    then:
    - The replica flips to state "drained"
    - An "Uncordon" action appears on the row
  - id: AC-003
    scenario: Force-kill a stuck drain
    given:
    - A replica has been draining longer than the graceful_shutdown timeout
    when:
    - I click "Force terminate" and type the replica id to confirm
    then:
    - The replica is terminated
    - The audit record captures the override with the remaining in_flight count
  ui:
    screens:
    - Settings
    components:
    - FleetDashboard
    - FleetReplicaDrawer
    - ConfirmTypeToMatch
    states:
    - ready
    - draining
    - drained
    - forced
  api:
  - method: POST
    path: /api/fleet/replicas/:id/drain
    request:
      body:
        reason: string
    response:
      ok: bool
    errors:
    - 403
    - 404
    - 409
    inferred: true
  - method: POST
    path: /api/fleet/replicas/:id/terminate
    request:
      body:
        reason: string
    response:
      ok: bool
    errors:
    - 403
    - 404
    inferred: true
  data_models:
  - FleetReplica
  non_functional:
  - Drain honors the project graceful_shutdown contract — in-flight requests complete and streams receive a terminal event before the process exits
  - Drain and terminate are idempotent — repeat invocation is safe and does not double-count in the audit log
  - Destructive force-terminate is gated by the destructive_action_confirmation_policy
- id: STORY-405
  feature: FEAT-170
  title: Monitor worker queue depth, lag and DLQ
  navigation: operator
  narrative:
    as_a: SRE
    i_want: live depth, oldest-message age, consumer count and DLQ depth per worker queue
    so_that: I can spot saturation and poison-message pile-ups before they become user-visible alerts
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Queue health table
    given:
    - I am on /settings/fleet/queues
    when:
    - The page loads
    then:
    - I see a row per WorkerQueue with name, depth, oldest_job_age_sec, consumer count, DLQ depth, retry count, p95_ms and status
    - Rows whose status is "degraded" or "stalled" are highlighted
  - id: AC-002
    scenario: DLQ inspector
    given:
    - A queue has non-zero DLQ depth
    when:
    - I click the DLQ count
    then:
    - I see the failed WorkerJob rows with last_error, attempt count and payload preview
    - I can select items and "Requeue" or "Purge" in bulk
  - id: AC-003
    scenario: Requeue and purge are audited
    given:
    - I have DLQ items selected
    when:
    - I invoke "Requeue" or "Purge" and confirm
    then:
    - The action is written to the audit log with actor, queue, item ids and action
    - The Purge action requires typing the queue name to confirm
  ui:
    screens:
    - Settings
    components:
    - QueueHealthTable
    - DLQInspector
    - ConfirmTypeToMatch
    states:
    - ok
    - degraded
    - stalled
  api:
  - method: GET
    path: /api/fleet/queues
    response:
      items: WorkerQueue[]
    errors:
    - 403
    inferred: true
  - method: POST
    path: /api/fleet/queues/:name/dlq/requeue
    request:
      body:
        job_ids: string[]
    response:
      requeued: int
    errors:
    - 403
    - 404
    inferred: true
  - method: POST
    path: /api/fleet/queues/:name/dlq/purge
    request:
      body:
        job_ids: string[]
        confirm_name: string
    response:
      purged: int
    errors:
    - 400
    - 403
    - 404
    inferred: true
  data_models:
  - WorkerQueue
  - WorkerJob
  non_functional:
  - Queue-health reads are served from the same metrics store that powers FEAT-167 — no direct broker polling from the UI path
  - Bulk requeue and purge are idempotent and capped per call to protect the broker
  - Purge is gated by the destructive_action_confirmation_policy
- id: STORY-406
  feature: FEAT-170
  title: Track config hot-reload propagation
  navigation: operator
  narrative:
    as_a: SRE
    i_want: to see the current live config version per replica and how long the last change took to propagate
    so_that: I can prove a policy, routing or rule change reached every node within the config-reload SLA
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Propagation summary
    given:
    - I am on /settings/fleet/config
    when:
    - The page loads
    then:
    - I see the last ConfigPropagation with change_kind, actor, created_at and target_version
    - A ready/total tile shows how many replicas have applied the target_version
    - The header shows the time since created_at and whether propagation cleared the 30-second SLA
  - id: AC-002
    scenario: Per-node drilldown
    given:
    - A ConfigPropagation is in progress or complete
    when:
    - I expand the propagation row
    then:
    - I see a row per replica with its current version, state (pending|applied|failed), applied_at and error (if any)
    - I can sort by applied_at or filter to only "pending" or "failed"
  - id: AC-003
    scenario: Retry a lagging node
    given:
    - A replica is in state "failed" for the current ConfigPropagation
    when:
    - I click "Retry"
    then:
    - The replica is re-notified of the target_version
    - The action is written to the audit log with actor, replica and propagation id
  ui:
    screens:
    - Settings
    components:
    - ConfigPropagationPanel
    - PropagationNodeTable
    states:
    - applying
    - applied
    - stalled
  api:
  - method: GET
    path: /api/fleet/config/propagation
    request:
      query:
        limit: int
    response:
      items: ConfigPropagation[]
    errors:
    - 403
    inferred: true
  - method: POST
    path: /api/fleet/config/propagation/:id/retry
    request:
      body:
        replica_ids: string[]
    response:
      retried: int
    errors:
    - 403
    - 404
    inferred: true
  data_models:
  - ConfigPropagation
  - FleetReplica
  non_functional:
  - Propagation status is eventually consistent — readers tolerate up to the config-reload SLA of skew
  - A propagation that breaches the 30-second SLA raises its own operational alert per EPIC-009
  - Retry is idempotent and safe to invoke multiple times on the same replica
- id: STORY-407
  feature: FEAT-171
  title: Surface the deployment mode and operator role to the UI
  navigation: operator
  narrative:
    as_a: platform operator (Antirion staff in saas, platform admin in self_hosted)
    i_want: the UI to know the deployment mode and my operator role
    so_that: operator surfaces render and tenant-only surfaces hide themselves consistently
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Mode and role exposed via bootstrap
    given:
    - I have signed in
    when:
    - The shell bootstraps
    then:
    - GET /api/bootstrap returns deployment_mode in {saas, self_hosted} and my_roles including "platform admin" only if I qualify
    - The shell renders the "Operator" top-level nav item only when my_roles contains "platform admin"
  - id: AC-002
    scenario: Mode pinned at install and immutable at runtime
    given:
    - The install config pinned deployment_mode
    when:
    - Any service starts
    then:
    - The mode is loaded once, logged, and included in every audit record
    - Attempts to change the mode via API return 404 or 405 — the mode is not a runtime setting
  ui:
    screens:
    - Shell
    components:
    - OperatorNav
    states:
    - saas_operator
    - self_hosted_operator
    - hidden
  api:
  - method: GET
    path: /api/bootstrap
    response:
      deployment_mode: string
      my_roles: string[]
      operator_surfaces_enabled: bool
    errors:
    - 401
    inferred: true
  data_models:
  - Org
  - User
  non_functional:
  - Mode and role checks run at the edge before any business logic — unauthorized operator-API calls never reach the handler
  - Role claims are verified from server-side state; client-sent role hints are ignored
  - The deployment mode is immutable for the life of an install; changing it requires a full re-provision
- id: STORY-408
  feature: FEAT-171
  title: Operator surfaces are invisible and unreachable from tenant roles
  navigation: operator
  narrative:
    as_a: security-and-compliance officer
    i_want: proof that tenant-role principals cannot see or reach operator surfaces in either mode
    so_that: multi-tenant isolation of the operator plane is auditable
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Tenant role cannot see operator nav
    given:
    - I am signed in as "owner" of a tenant workspace (not platform admin)
    when:
    - The shell renders in saas mode
    then:
    - No "Operator" nav item appears
    - Every /operator/* route returns 404 rather than 403 so existence is not disclosed
  - id: AC-002
    scenario: Operator API endpoints reject tenant principals
    given:
    - I hold a tenant-role session
    when:
    - I call any /api/operator/* endpoint directly
    then:
    - The edge returns 404
    - An AuditLog "operator.access_denied" records actor, path and timestamp
  - id: AC-003
    scenario: self_hosted non-operator role is also denied
    given:
    - The deployment mode is self_hosted and I hold the "owner" role but not platform admin
    when:
    - I call any /api/operator/* endpoint
    then:
    - The edge returns 404 and writes the same AuditLog entry
  ui:
    screens:
    - Shell
    components:
    - OperatorNav
    states:
    - tenant_view
  api:
  - method: GET
    path: /api/operator/_probe
    response:
      ok: bool
    errors:
    - 404
    inferred: true
  data_models:
  - AuditLog
  non_functional:
  - Operator-surface 404s must be indistinguishable from genuine not-found responses — no timing side channel, no body text hint
  - Access-denial audit records are written asynchronously so they cannot rate-limit the 404 response
  - Tenant-isolation of the operator plane is continuously verified by FEAT-134
- id: STORY-409
  feature: FEAT-172
  title: Cross-tenant roster in saas mode
  navigation: operator
  narrative:
    as_a: Antirion platform operator
    i_want: a live roster of every tenant Org on the platform with plan, spend, seats, residency and incident flags
    so_that: I can spot struggling tenants, policy violations and churn risk at a glance
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Roster in saas mode
    given:
    - The deployment mode is saas
    - I hold platform admin
    when:
    - I navigate to /operator/tenants
    then:
    - I see a row per Org with id, name, plan, seat_count, spend_30d, residency_region, incident_flag and last_activity_at
    - Columns are sortable; free-text search filters across name, id and primary contact
    - The header shows platform-wide totals (tenants, active seats, 30-day spend)
  - id: AC-002
    scenario: Degenerate self_hosted view
    given:
    - The deployment mode is self_hosted
    when:
    - The platform admin navigates to /operator/tenants
    then:
    - A single-row read-only summary of the local install is shown
    - Cross-tenant columns (plan, seat count relative to platform) are replaced with "n/a"
  ui:
    screens:
    - Operator
    components:
    - TenantRosterTable
    states:
    - saas
    - self_hosted_single_row
  api:
  - method: GET
    path: /api/operator/tenants
    request:
      query:
        q: string
        plan: string
        region: string
        sort: string
        cursor: string
    response:
      items: Org[]
      next_cursor: string
    errors:
    - 403
    - 404
    inferred: true
  data_models:
  - Org
  - ResidencyConfig
  non_functional:
  - Roster queries read from pre-aggregated operator rollups computed by the worker fleet — the operator UI never scans tenant request logs
  - Tenant-level PII is minimized in the roster; drill-in (STORY-413) is the only path to richer detail and is audited
  - Access is gated by platform admin plus deployment_mode per STORY-411
- id: STORY-410
  feature: FEAT-172
  title: Drill into a tenant from the roster
  navigation: operator
  narrative:
    as_a: Antirion platform operator
    i_want: to open a single-tenant operator view showing health, spend trend, quota consumption and open incidents
    so_that: I can investigate or support a tenant without touching their tenant-scoped admin surfaces
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Open tenant detail
    given:
    - I am on /operator/tenants
    when:
    - I click an Org row
    then:
    - A TenantDetailDrawer opens with 30-day spend, request volume, error rate, p95 latency, seat consumption, residency region and a list of open PlatformIncident items affecting this tenant
  - id: AC-002
    scenario: Drill-in is audited
    given:
    - The drawer is open
    when:
    - The view loads
    then:
    - An AuditLog "operator.tenant_view" is written with actor, target Org id and reason field (optional)
    - The tenant's own audit log records a matching "operator_accessed" entry per FEAT-120
  ui:
    screens:
    - Operator
    components:
    - TenantDetailDrawer
    states:
    - healthy
    - degraded
    - incident
  api:
  - method: GET
    path: /api/operator/tenants/:id
    response:
      org: Org
      spend_30d: number
      seat_consumption: number
      open_incidents: PlatformIncident[]
    errors:
    - 403
    - 404
    inferred: true
  data_models:
  - Org
  - PlatformIncident
  - AuditLog
  non_functional:
  - Operator drill-in never sees tenant prompt bodies; redaction is enforced before the data leaves the tenant's region
  - Tenant-originated audit visibility is mandatory — the tenant's owner can see which operator viewed them and when
- id: STORY-411
  feature: FEAT-172
  title: Suspend or resume a tenant with audit and notice
  navigation: operator
  narrative:
    as_a: Antirion platform operator
    i_want: to suspend a tenant (typically for non-payment or policy violation) and resume them later
    so_that: the platform can enforce commercial and abuse-policy outcomes without touching data
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Suspend a tenant
    given:
    - I am on the tenant detail for Org X
    when:
    - I click "Suspend", pick a reason from a fixed taxonomy, optionally add a note, and type the Org id to confirm
    then:
    - Org X flips to state "suspended"; its gateway keys return 403 with a suspension body
    - The tenant owner receives a notification per EPIC-009 with the reason and renewal path
    - An AuditLog "tenant.suspended" is written on both the operator-plane and tenant-plane audit stores
  - id: AC-002
    scenario: Resume a tenant
    given:
    - Org X is suspended
    when:
    - I click "Resume" and confirm
    then:
    - Org X flips to state "active"; keys start accepting traffic within the config-reload SLA
    - An AuditLog "tenant.resumed" is written on both audit stores
  - id: AC-003
    scenario: Saas-only
    given:
    - The deployment mode is self_hosted
    when:
    - The platform admin opens the tenant detail
    then:
    - The Suspend and Resume controls are not rendered
    - The corresponding endpoints return 404
  ui:
    screens:
    - Operator
    components:
    - TenantSuspendDialog
    - ConfirmTypeToMatch
    states:
    - active
    - suspended
  api:
  - method: POST
    path: /api/operator/tenants/:id/suspend
    request:
      body:
        reason: string
        note: string
        confirm_id: string
    response:
      ok: bool
    errors:
    - 400
    - 403
    - 404
    - 409
    inferred: true
  - method: POST
    path: /api/operator/tenants/:id/resume
    response:
      ok: bool
    errors:
    - 403
    - 404
    - 409
    inferred: true
  data_models:
  - Org
  - AuditLog
  non_functional:
  - Suspend and resume are gated by the destructive_action_confirmation_policy — typed confirmation of the Org id is mandatory
  - Suspension takes effect at the edge within the config-reload SLA
  - No tenant data is modified or deleted by suspension — suspension is commercially reversible
- id: STORY-412
  feature: FEAT-173
  title: Declare a platform-wide incident
  navigation: operator
  narrative:
    as_a: Antirion platform operator
    i_want: to declare an incident with component, region, severity and summary
    so_that: affected tenants and downstream dashboards update in real time without a Slack-to-status-page handoff delay
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Create an incident
    given:
    - I am on /operator/incidents
    when:
    - I click "Declare incident", select components, regions, severity and a summary, and submit
    then:
    - A PlatformIncident is created with state "investigating"
    - The FEAT-163 public status page and its in-app widget update within 30 seconds for every affected tenant
    - At severity "major" or higher, each affected Org.primary_contact receives an incident notification via email and the in-product notification inbox; in self_hosted mode with a single-tenant install this collapses to a single recipient
    - An AuditLog "incident.declared" is written with the acting operator (Antirion staff id in saas, platform admin in self_hosted), the resolved affected-tenant list and the notification audience
  - id: AC-002
    scenario: Update the incident timeline
    given:
    - An incident is open
    when:
    - I post a timeline update (identified, mitigated, resolved)
    then:
    - The incident timeline appends the entry
    - The status widget updates accordingly within 30 seconds
    - On "resolved" the incident is closed and the widget flips to green
  ui:
    screens:
    - Operator
    components:
    - IncidentDeclareDialog
    - IncidentTimeline
    states:
    - investigating
    - identified
    - mitigated
    - resolved
  api:
  - method: POST
    path: /api/operator/incidents
    request:
      body:
        components: string[]
        regions: string[]
        severity: string
        summary: string
    response:
      incident: PlatformIncident
    errors:
    - 400
    - 403
    inferred: true
  - method: POST
    path: /api/operator/incidents/:id/timeline
    request:
      body:
        state: string
        body: string
    response:
      incident: PlatformIncident
    errors:
    - 400
    - 403
    - 404
    inferred: true
  data_models:
  - PlatformIncident
  - AuditLog
  non_functional:
  - Incident broadcasts reach every affected tenant's in-app widget within 30 seconds via the same propagation path as config hot-reload
  - An incident in one region must not block writes or reads of incidents in another region — the store is regionally partitioned and globally read-replicated
- id: STORY-413
  feature: FEAT-173
  title: Compute affected tenants from routing and budgets
  navigation: operator
  narrative:
    as_a: Antirion platform operator
    i_want: the incident form to compute the affected tenants from the components and regions I selected
    so_that: the status widget only shows up for tenants who were actually affected
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Preview affected tenants
    given:
    - I am composing an incident targeting component "provider:openai" in region "us-east-1"
    when:
    - The form's "Preview affected" button is clicked
    then:
    - A count and sample list of affected Orgs is shown, derived from the last 24h of routing traffic that touches that component in that region
    - Tenants whose routing chain has an unaffected fallback are marked "auto-mitigated"
  - id: AC-002
    scenario: Broadcast only to affected tenants
    given:
    - The incident is declared
    when:
    - The status widget renders for each tenant
    then:
    - Only affected-tenant widgets show the incident
    - Auto-mitigated tenants see an informational note instead of a red banner
  ui:
    screens:
    - Operator
    components:
    - AffectedTenantsPreview
    states:
    - computing
    - ready
    - empty
  api:
  - method: POST
    path: /api/operator/incidents/preview
    request:
      body:
        components: string[]
        regions: string[]
    response:
      affected_count: int
      sample: Org[]
      auto_mitigated_count: int
    errors:
    - 400
    - 403
    inferred: true
  data_models:
  - PlatformIncident
  - Org
  non_functional:
  - Preview reads from routing rollups — no live scan of request logs on the operator path
  - Preview is a pure function of input; repeat calls with the same inputs are stable within the rollup freshness window
- id: STORY-414
  feature: FEAT-173
  title: Schedule a maintenance window with advance notice
  navigation: operator
  narrative:
    as_a: Antirion platform operator
    i_want: to schedule a maintenance window ahead of time with the affected components and regions
    so_that: tenants get advance warning and we don't surprise customers with a sudden red banner
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Schedule a window
    given:
    - I am on /operator/incidents
    when:
    - I click "Schedule maintenance", pick start, end, components, regions and a summary, and submit
    then:
    - A PlatformIncident of kind "maintenance" is created in state "scheduled"
    - Every affected tenant receives a notification at least 24 hours before start (configurable)
    - The widget shows the scheduled window starting from the first notification
  - id: AC-002
    scenario: Cancel or adjust a scheduled window
    given:
    - A scheduled window exists and has not started
    when:
    - I cancel or change start/end
    then:
    - Affected tenants receive an updated notification within the config-reload SLA
    - The audit log records the change with actor, before and after
  ui:
    screens:
    - Operator
    components:
    - MaintenanceScheduleForm
    states:
    - scheduled
    - in_progress
    - completed
    - cancelled
  api:
  - method: POST
    path: /api/operator/maintenance
    request:
      body:
        starts_at: timestamp
        ends_at: timestamp
        components: string[]
        regions: string[]
        summary: string
    response:
      incident: PlatformIncident
    errors:
    - 400
    - 403
    inferred: true
  data_models:
  - PlatformIncident
  non_functional:
  - Notification coalescing — a tenant never receives more than one notification per maintenance window per channel regardless of edit count
  - Scheduling below the advance-notice minimum requires an explicit override that is audited
- id: STORY-415
  feature: FEAT-174
  title: See the fleet-by-region deploy matrix
  navigation: operator
  narrative:
    as_a: platform operator
    i_want: a matrix of fleet × region × version with replica counts and health
    so_that: I can see at a glance which builds are live where and spot stuck rollouts
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Deploy matrix view
    given:
    - I am on /operator/releases
    when:
    - The page loads
    then:
    - A matrix renders with rows per fleet (gateway, api, worker), columns per region, and cells showing the dominant version and count of replicas on that version
    - Cells with mixed versions show an N-1/N split and a "rollout in progress" pill
    - A side panel lists the last ten FleetDeployment records with state (pending, canarying, promoting, rolled_back, complete)
  - id: AC-002
    scenario: Drill into a single FleetDeployment
    given:
    - The matrix is rendered
    when:
    - I click a FleetDeployment row
    then:
    - I see the per-replica progress, the canary metrics, and the promotion or rollback buttons
  ui:
    screens:
    - Operator
    components:
    - DeployMatrix
    - FleetDeploymentDrawer
    states:
    - idle
    - canarying
    - promoting
    - rolled_back
  api:
  - method: GET
    path: /api/operator/releases
    response:
      matrix: object
      recent: FleetDeployment[]
    errors:
    - 403
    inferred: true
  data_models:
  - FleetDeployment
  - FleetReplica
  non_functional:
  - The matrix reads the same heartbeat stream FEAT-170 uses — no separate source of truth on what is running
  - Cells are consistent within 10 seconds of a replica state change
- id: STORY-416
  feature: FEAT-174
  title: Stage a canary and watch SLO impact
  navigation: operator
  narrative:
    as_a: platform operator
    i_want: to promote a new build to a canary slice (one region, one fleet, one percent of traffic) and watch its SLO deltas live
    so_that: I catch regressions on real traffic before full rollout
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Stage a canary
    given:
    - A FleetDeployment is pending
    when:
    - I click "Stage canary", pick fleet, region and traffic percent, and confirm
    then:
    - The canary receives the selected percentage of traffic
    - A live SLO panel renders p50/p95/p99 gateway-added latency and error rate for canary vs baseline
  - id: AC-002
    scenario: Promote
    given:
    - The canary has been healthy for the configured bake time (default 15 min)
    when:
    - I click "Promote" and confirm
    then:
    - The rollout continues across regions per the promotion plan
    - An AuditLog "release.promoted" is written with actor, build and plan
  ui:
    screens:
    - Operator
    components:
    - CanaryPanel
    - SLOCompareChart
    states:
    - staging
    - baking
    - promoting
  api:
  - method: POST
    path: /api/operator/releases/:id/canary
    request:
      body:
        fleet: string
        region: string
        traffic_pct: number
    response:
      deployment: FleetDeployment
    errors:
    - 400
    - 403
    - 404
    inferred: true
  - method: POST
    path: /api/operator/releases/:id/promote
    response:
      deployment: FleetDeployment
    errors:
    - 400
    - 403
    - 404
    - 409
    inferred: true
  data_models:
  - FleetDeployment
  - FleetReplica
  non_functional:
  - Canary traffic selection is deterministic per Request-Id so the same trace always hits the same side — comparison is apples-to-apples
  - SLO deltas are computed on the same 1-minute rollups the workspace dashboards use, so operator and tenant see the same numbers
- id: STORY-417
  feature: FEAT-174
  title: Auto-rollback on SLO breach
  navigation: operator
  narrative:
    as_a: platform operator
    i_want: an automatic rollback when a canary breaches a named SLO threshold
    so_that: bad builds self-unwind before they hurt tenants
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Breach triggers rollback
    given:
    - A canary is running with rollback rule "p95_added_latency > 3 ms for 5 min"
    when:
    - The metric breaches the rule
    then:
    - The rollout flips to "rolled_back" and the canary replicas drain via FEAT-170 drain
    - The platform operator audience — Antirion SRE in saas, platform admin in self_hosted — is paged at severity "crit" with the offending metric sample
    - In saas mode the primary_contact of each affected tenant is additionally notified at severity "info" only after an incident is declared via FEAT-173; rollback alone does not message tenants
    - The incident broadcast (FEAT-173) is offered as a one-click follow-up
    - An AuditLog "release.auto_rollback" is written with the offending metric sample and the resolved notification audience
  - id: AC-002
    scenario: Manual rollback
    given:
    - A rollout is in any state other than "rolled_back" or "complete"
    when:
    - I click "Roll back" and confirm
    then:
    - Same as AC-001 minus the metric evidence — manual intent is recorded instead
  ui:
    screens:
    - Operator
    components:
    - CanaryPanel
    - ConfirmTypeToMatch
    states:
    - rolling_back
    - rolled_back
  api:
  - method: POST
    path: /api/operator/releases/:id/rollback
    request:
      body:
        reason: string
        confirm_id: string
    response:
      deployment: FleetDeployment
    errors:
    - 400
    - 403
    - 404
    inferred: true
  data_models:
  - FleetDeployment
  non_functional:
  - Auto-rollback decisions run in the worker fleet on the SLO rollup stream — not in the request path
  - Rollback drains honor the project graceful_shutdown contract so in-flight requests are not dropped
- id: STORY-418
  feature: FEAT-175
  title: Install and verify a self_hosted license
  navigation: operator
  narrative:
    as_a: platform admin on a self_hosted deployment
    i_want: to install an Antirion license file or key and see it verified against the licensing server
    so_that: the install is authorized to run with the entitlements we paid for
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Upload a license
    given:
    - The deployment mode is self_hosted
    - No License exists yet
    when:
    - I upload a license file on /operator/license
    then:
    - The license is verified cryptographically against the bundled root public key
    - A License record is created with entitlement limits (seats, rps, retention_days, features[])
    - An AuditLog "license.installed" is written
  - id: AC-002
    scenario: Saas mode returns 404
    given:
    - The deployment mode is saas
    when:
    - Any principal calls /api/operator/license
    then:
    - The endpoint returns 404 — licensing is inapplicable in saas mode
  - id: AC-003
    scenario: Malformed or expired license rejected
    given:
    - I upload an invalid or expired license
    when:
    - Verification fails
    then:
    - The upload is rejected with a specific error
    - No License record is created
    - An AuditLog "license.rejected" is written with the reason
  ui:
    screens:
    - Operator
    components:
    - LicenseUpload
    states:
    - empty
    - verifying
    - valid
    - invalid
  api:
  - method: POST
    path: /api/operator/license
    request:
      body:
        license_blob: string
    response:
      license: License
    errors:
    - 400
    - 403
    - 404
    inferred: true
  data_models:
  - License
  - AuditLog
  non_functional:
  - License verification is fully offline — no outbound call is required to boot a self_hosted install from a valid license file
  - License blobs and private keys are not logged; only the fingerprint appears in audit records
- id: STORY-419
  feature: FEAT-175
  title: See entitlement limits and consumption
  navigation: operator
  narrative:
    as_a: platform admin on a self_hosted deployment
    i_want: to see how much of each entitlement (seats, rps, retention days, features) is consumed and how much is available
    so_that: I can negotiate a renewal with headroom before we hit a limit
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Entitlement dashboard
    given:
    - A valid License is installed
    when:
    - I navigate to /operator/license
    then:
    - I see each entitlement with its limit, current usage, 30-day trend and percentage
    - Limits at or above 80% show a "near limit" pill; at or above 100% show "over limit"
  - id: AC-002
    scenario: Feature entitlement enforcement
    given:
    - A feature "semantic_cache" is not in the License.features set
    when:
    - A tenant tries to enable semantic caching
    then:
    - The feature is hidden in the tenant UI and the API returns 402 "entitlement_required" at the edge
  - id: AC-003
    scenario: Over-consumption fail-closed notification
    given:
    - An entitlement (for example seats) is at or above 100% of its limit
    when:
    - The daily license-check worker runs
    then:
    - The platform admin receives a notification naming the breached entitlement, the observed value and the path to renew
    - When the "license" phone-home channel (FEAT-179) is enabled the same event is sent to Antirion renewals so Antirion can reach out commercially; when disabled no outbound call is made
    - FEAT-180 (license-violation incident flow) is invoked to manage the soft-grace and hard-close transition
  ui:
    screens:
    - Operator
    components:
    - EntitlementDashboard
    states:
    - ok
    - near_limit
    - over_limit
  api:
  - method: GET
    path: /api/operator/license/entitlements
    response:
      items: object[]
    errors:
    - 403
    - 404
    inferred: true
  data_models:
  - License
  non_functional:
  - Entitlement usage is computed from the same rollups as the tenant dashboards — no duplicate meter
  - Entitlement checks run at the edge with a cached decision; the cache respects the config-reload SLA
- id: STORY-420
  feature: FEAT-175
  title: License renewal reminders and expiry behavior
  navigation: operator
  narrative:
    as_a: platform admin on a self_hosted deployment
    i_want: advance warning before the license expires and a defined fail-closed behavior after it does
    so_that: we never silently disable production traffic and we always have a visible path to renew
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Advance reminders
    given:
    - A License is valid and expires in 30 days
    when:
    - The daily license-check worker runs
    then:
    - A reminder is shown in /operator/license starting at 30, 14, 7, 3 and 1 days before expiry
    - The platform admin receives a notification on each of those days via email and in-product inbox
    - When the "license" phone-home channel (FEAT-179) is enabled a heartbeat with the same reminder schedule is sent to Antirion renewals so Antirion can proactively contact the customer about renewal; when disabled no outbound call is made and renewal outreach depends on the customer reaching out
  - id: AC-002
    scenario: Expiry fail-closed
    given:
    - The License has expired
    when:
    - Any gateway or control-plane API request runs
    then:
    - New tenant writes are rejected with 402 "license_expired"
    - Read-only and operator-license surfaces remain available so a new license can be installed
    - Existing long-running streams finish naturally; new streams are refused
  ui:
    screens:
    - Operator
    components:
    - LicenseExpiryBanner
    states:
    - valid
    - expiring_soon
    - expired
  api:
  - method: GET
    path: /api/operator/license/status
    response:
      state: string
      expires_at: timestamp
      days_remaining: int
    errors:
    - 403
    - 404
    inferred: true
  data_models:
  - License
  non_functional:
  - Expiry behavior is deterministic and documented — no silent degradation
  - The license-check worker is redundant across replicas; a single failed check does not trigger spurious reminders
- id: STORY-421
  feature: FEAT-176
  title: Noisy-neighbor and quota-pressure board
  navigation: operator
  narrative:
    as_a: platform operator
    i_want: a board of tenants whose consumption is pressing their quotas or inflating a neighbor's latency
    so_that: I can act on isolation problems before they become tenant-visible incidents
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Pressure board
    given:
    - I am on /operator/isolation
    when:
    - The page loads
    then:
    - A table lists tenants sorted by recent quota-pressure score with columns for CPU share, queue-slot consumption, concurrency peak and rate-limit rejection rate
    - Rows above the configured threshold are flagged and link to the tenant detail
  - id: AC-002
    scenario: self_hosted degenerate view
    given:
    - The deployment mode is self_hosted
    when:
    - The board renders
    then:
    - Only the single local tenant appears — columns still render but cross-tenant comparisons are n/a
  ui:
    screens:
    - Operator
    components:
    - PressureBoard
    states:
    - ok
    - flagged
  api:
  - method: GET
    path: /api/operator/isolation/pressure
    response:
      items: object[]
    errors:
    - 403
    inferred: true
  data_models:
  - Org
  non_functional:
  - The board reads from operator-rollup stores; request-path latency is never affected by this view loading
  - Per-tenant scores are computed by the worker fleet on a bounded schedule so the board is freshness-bounded rather than real-time
- id: STORY-422
  feature: FEAT-176
  title: Triage an abuse flag with evidence
  navigation: operator
  narrative:
    as_a: platform operator
    i_want: to triage an abuse flag (CSAM-like prompt pattern, credential stuffing, scraping, prompt-injection mill) with attached evidence and a defined set of actions
    so_that: platform abuse is handled consistently and auditably
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Flag queue
    given:
    - I am on /operator/abuse
    when:
    - The page loads
    then:
    - A queue of abuse flags is shown with tenant, rule, first-seen, last-seen and severity
    - Evidence samples are redacted before leaving the tenant region per the project security contract
  - id: AC-002
    scenario: Resolve a flag
    given:
    - A flag is open
    when:
    - I pick an action (dismiss, warn, suspend-for-review, suspend) and confirm
    then:
    - The flag is resolved with the chosen action
    - For "warn" the affected Org.primary_contact (falling back to Org.owner) receives a warn notification with the rule, evidence summary and cure-by date
    - For "suspend-for-review" and "suspend" the affected Org.owner and Org.primary_contact are notified via email and in-product inbox with the reason and appeal path; in saas mode Antirion legal is additionally notified because platform suspension is a commercial action
    - In self_hosted mode with a single tenant the notifications collapse to Org.owner and platform admin; the "dismiss" action emits no tenant notification
    - For suspend actions, STORY-414 is invoked inline with the flag id as the reason
    - An AuditLog "abuse.triaged" is written with actor, flag id, action and the resolved notification audience
  ui:
    screens:
    - Operator
    components:
    - AbuseQueue
    - AbuseEvidenceViewer
    states:
    - open
    - resolved
  api:
  - method: GET
    path: /api/operator/abuse/flags
    response:
      items: object[]
    errors:
    - 403
    inferred: true
  - method: POST
    path: /api/operator/abuse/flags/:id/resolve
    request:
      body:
        action: string
        note: string
    response:
      ok: bool
    errors:
    - 400
    - 403
    - 404
    inferred: true
  data_models:
  - Org
  - AuditLog
  non_functional:
  - Evidence is redacted in the tenant region before any operator-plane access — raw prompts never traverse the operator path
  - Triage actions inherit the destructive_action_confirmation_policy where they affect tenant service
- id: STORY-423
  feature: FEAT-177
  title: Run the self_hosted first-boot install wizard end-to-end
  navigation: operator
  narrative:
    as_a: platform admin on a fresh self_hosted install
    i_want: a guided wizard that configures dependencies, licence, residency and the first Org
    so_that: the install reaches a usable state without hand-editing config files and without a partial-configuration failure mode
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Wizard runs before any tenant traffic is served
    given:
    - A freshly deployed self_hosted install with no prior InstallState row
    when:
    - A client sends any tenant request to the gateway
    then:
    - The gateway responds 503 with a body pointing at /operator/install
    - The control plane only exposes the wizard endpoints and /healthz until the wizard reports "complete"
  - id: AC-002
    scenario: Wizard step sequence
    given:
    - I am on /operator/install as the bootstrap principal
    when:
    - I walk the steps in order
    then:
    - Step 1 uploads and validates TLS certificates for the control-plane and gateway hostnames
    - Step 2 captures external dependency connection strings (Postgres, Redis, ClickHouse, object store, queue broker — NATS JetStream) and runs the validator from STORY-424
    - Step 3 configures SSO identity-provider settings (or opts for local password auth for the platform admin only)
    - Step 4 bootstraps the platform admin account per STORY-425
    - Step 5 pins a residency label that is written into ResidencyConfig and is immutable for the install
    - Step 6 installs the license by handing off to FEAT-175
    - Step 7 creates the first Org with its owner
    - The wizard persists InstallState after each step so a crash resumes from the last completed step
  data_models:
  - InstallState
  - ResidencyConfig
  - License
  - Org
  - User
  - AuditLog
  non_functional:
  - Wizard surfaces are available in self_hosted mode only — in saas mode every wizard endpoint returns 404
  - Every step writes an AuditLog entry with actor, step, before and after
- id: STORY-424
  feature: FEAT-177
  title: Validate external dependency connectivity during the install wizard
  navigation: operator
  narrative:
    as_a: platform admin running the install wizard
    i_want: live validation that the entered Postgres, Redis, ClickHouse, object-store and queue-broker connection strings actually work
    so_that: I find misconfigured dependencies before promoting the install rather than during first tenant traffic
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Validator per dependency
    given:
    - I entered connection strings on step 2 of the wizard
    when:
    - I click "Test connections"
    then:
    - For each dependency the wizard runs a read and a write probe and displays latency, version and success or a structured error with a remediation hint
    - I cannot advance to step 3 until every required dependency validates green or I explicitly mark an optional one as skipped
  data_models:
  - InstallState
  non_functional:
  - Validation probes are idempotent and produce no persistent tenant data
  - Every failed probe writes an AuditLog entry so a re-run can be compared
- id: STORY-425
  feature: FEAT-177
  title: Bootstrap the platform admin account
  navigation: operator
  narrative:
    as_a: person deploying a self_hosted install
    i_want: a one-shot bootstrap that creates the first platform admin without requiring an existing user
    so_that: there is always exactly one way to get the first operator credential with a known provenance
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Single-use bootstrap token
    given:
    - A fresh install emits a one-time bootstrap token to the container logs on first start
    when:
    - I POST the token plus a chosen email and password to /api/bootstrap
    then:
    - A User is created with role platform admin
    - The bootstrap token is invalidated and cannot be reused
    - An AuditLog "install.platform_admin_bootstrapped" is written referencing the token id
  - id: AC-002
    scenario: SSO-only mode
    given:
    - The wizard step 3 selected SSO as the platform admin auth source
    when:
    - I submit the SSO IdP metadata and a claimed identifier
    then:
    - The first user matching the claimed identifier on SSO sign-in is granted platform admin
    - No password is set and /api/bootstrap is disabled
  data_models:
  - User
  - AuditLog
  non_functional:
  - The bootstrap token lives only in container logs and is never persisted to any store the tenant plane can read
  - platform admin is a reserved built-in role (see FEAT-012) and cannot be granted through normal role management
- id: STORY-426
  feature: FEAT-177
  title: Complete and lock the install wizard
  navigation: operator
  narrative:
    as_a: platform admin finishing the install wizard
    i_want: a final "complete" transition that flips the install into serving mode and prevents re-entry to the wizard
    so_that: subsequent operator actions use the normal EPIC-013 surfaces and nobody can silently re-run install steps
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Complete transition
    given:
    - Every required wizard step has validated green
    when:
    - I click "Finish install"
    then:
    - InstallState.status becomes "complete" and is stamped with the completing platform admin user_id and timestamp
    - The tenant-serving routes come up on the gateway and the control plane
    - /operator/install flips to a read-only summary and its mutating endpoints return 409
    - An AuditLog "install.completed" is written
  data_models:
  - InstallState
  - AuditLog
  non_functional:
  - Re-running any wizard endpoint after completion returns 409 and is audited as "install.rerun_blocked"
  - Fleet version and schema-migration state at completion are snapshotted into InstallState for comparison by FEAT-178 upgrade flows
- id: STORY-427
  feature: FEAT-178
  title: Acquire a signed release artefact — online and air-gapped
  navigation: operator
  narrative:
    as_a: platform admin planning an upgrade
    i_want: to acquire the target release artefact either from Antirion's CDN (online) or from a local path (air-gapped)
    so_that: installs without Internet access can still upgrade through a documented supply-chain path
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Online acquisition
    given:
    - The "license" phone-home channel (FEAT-179) is enabled and the install is entitled to the target channel
    when:
    - I select a release from the channel list and click "Download"
    then:
    - The artefact is fetched from the Antirion CDN, signature-verified against the pinned Antirion signing key, hash-verified against the release manifest and stored locally
    - An AuditLog "upgrade.artefact_acquired" records source, version, digest and verification result
  - id: AC-002
    scenario: Air-gapped import
    given:
    - The install is air-gapped (all phone-home channels disabled)
    when:
    - I upload a pre-downloaded artefact plus manifest through /operator/upgrade/import
    then:
    - The artefact is signature- and hash-verified with the same checks as the online path
    - A missing or invalid signature blocks the upload with a structured error naming the failing check
  data_models:
  - ReleaseArtefact
  - AuditLog
  non_functional:
  - Signature verification is mandatory on both paths — there is no "--skip-verify" flag
  - Artefacts are stored on the local object store with an integrity hash checked again at every install-time read
- id: STORY-428
  feature: FEAT-178
  title: Pre-flight and schema-migration gate
  navigation: operator
  narrative:
    as_a: platform admin about to roll a new version
    i_want: an explicit pre-flight that refuses the upgrade when schema migrations would break the one-release backward-compatibility window
    so_that: rolling upgrades never collide with a breaking migration mid-fleet
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Compatibility window check
    given:
    - The install is on version N
    - I selected target version M
    when:
    - I click "Pre-flight"
    then:
    - The gate refuses the upgrade when any migration in the N to M delta is not backward-compatible for one release per the non-functional baseline
    - The gate names the offending migration and the required intermediate version
  - id: AC-002
    scenario: Dry-run migration
    given:
    - Pre-flight passed
    when:
    - I click "Dry-run migrations"
    then:
    - Migrations run against a shadow schema on the same database and a diff is produced
    - No tenant-visible schema change is made by the dry run
  data_models:
  - ReleaseArtefact
  - AuditLog
  non_functional:
  - Pre-flight never writes to tenant data and is safe to run against production
  - Dry-run duration is bounded; a run exceeding the bound is aborted and reported rather than left orphaned
- id: STORY-429
  feature: FEAT-178
  title: Staged roll-forward with rollback plan
  navigation: operator
  narrative:
    as_a: platform admin executing an upgrade
    i_want: to roll the new version through the fleet × region matrix in stages and have a defined rollback if SLO breaches
    so_that: self_hosted upgrades match the safety profile of FEAT-174 canary and rollback for saas
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Stage the rollout
    given:
    - The release artefact is verified and migrations dry-ran green
    when:
    - I pick a roll-forward plan (for example 1 replica, 10%, 50%, 100%) and start
    then:
    - FleetDeployment rows are written per stage and promotion between stages requires an explicit click
    - A stuck or breaching stage blocks promotion and prompts the rollback path
  - id: AC-002
    scenario: Rollback on breach
    given:
    - A stage has breached the configured rollback rule
    when:
    - I click "Roll back"
    then:
    - The affected replicas drain per FEAT-170 and are restarted on the previous version
    - An AuditLog "upgrade.rolled_back" is written with the breach sample
  data_models:
  - FleetDeployment
  - AuditLog
  non_functional:
  - Stage transitions emit the same telemetry as FEAT-174 so the SRE dashboards are reusable
  - Schema migrations committed by the new version remain backward-compatible for at least one release so rollback is safe
- id: STORY-430
  feature: FEAT-179
  title: Toggle phone-home channels per install
  navigation: operator
  narrative:
    as_a: platform admin on a self_hosted install
    i_want: per-channel on/off switches for license, metrics, crash, security, support and docs
    so_that: I can match the install's outbound profile to my organisation's network policy
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Toggle a channel
    given:
    - I am on /operator/phone-home
    when:
    - I flip the "metrics" channel from on to off
    then:
    - The in-flight batcher drains any buffered metrics payload and stops producing new ones
    - The channel row shows "disabled" with the acting user and timestamp
    - An AuditLog "phone_home.channel.toggled" is written with the before and after value
  - id: AC-002
    scenario: Payload schema and data-class display
    given:
    - I expand a channel row
    when:
    - The panel renders
    then:
    - I see the exact payload schema, the data class of every field and the Antirion retention policy for that channel
  ui:
    screens:
    - Operator
    components:
    - PhoneHomeChannelList
    - PayloadSchemaDialog
    states:
    - enabled
    - disabled
    - forced_on_saas
  api:
  - method: GET
    path: /api/operator/phone-home/channels
    response:
      items: PhoneHomeChannel[]
    errors:
    - 403
    inferred: true
  - method: POST
    path: /api/operator/phone-home/channels/:name/toggle
    request:
      body:
        enabled: bool
        reason: string
    response:
      channel: PhoneHomeChannel
    errors:
    - 400
    - 403
    inferred: true
  data_models:
  - PhoneHomeChannel
  - AuditLog
  non_functional:
  - In saas mode the toggle API returns 403 for every channel — saas installs cannot opt out
  - Per-channel payload schemas are part of the signed release and cannot be modified at runtime
- id: STORY-431
  feature: FEAT-179
  title: Pin air-gapped mode and prove no egress
  navigation: operator
  narrative:
    as_a: platform admin on a sensitive install
    i_want: an air-gapped pin that hard-disables every phone-home channel at the egress layer
    so_that: I can evidence to auditors that the install makes no outbound calls to Antirion
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Pin air-gapped
    given:
    - I am on /operator/phone-home
    when:
    - I pin "air-gapped" with typed confirmation of the install id
    then:
    - Every channel flips to disabled and is locked read-only
    - The egress layer refuses any connection to an Antirion-controlled hostname and a refused attempt is audited as "phone_home.egress_blocked"
  - id: AC-002
    scenario: Unpin requires platform admin and a reason
    given:
    - The install is pinned air-gapped
    when:
    - I click "Unpin" and provide a reason
    then:
    - The pin is released, but every channel remains disabled until individually re-enabled
    - An AuditLog "phone_home.air_gapped.unpinned" is written with the reason
  data_models:
  - PhoneHomeChannel
  - AuditLog
  non_functional:
  - Any compiled code path that dials an Antirion-controlled hostname when the air-gapped pin is set is a continuous-integration failure enforced by the egress test harness
  - The pin is visible in the in-app status badge on every operator page so an operator never forgets the state of the install
- id: STORY-432
  feature: FEAT-179
  title: Audit every outbound call and payload digest
  navigation: operator
  narrative:
    as_a: platform admin or internal auditor
    i_want: a local record of every phone-home call including channel, endpoint, payload digest, response code and latency
    so_that: I can evidence what left the install without needing access to Antirion's side
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Outbound call log
    given:
    - Phone-home channels have been active over the last 24h
    when:
    - I open /operator/phone-home/log
    then:
    - I see a row per call with timestamp, channel, endpoint, SHA-256 digest of the payload, response code, latency and a "inspect sample" action that renders the payload through the same redaction rules as the original send
  data_models:
  - PhoneHomeCallLog
  non_functional:
  - Call-log writes are append-only and hash-chained like AuditLog
  - The "inspect sample" action never reveals fields above the channel's declared data class
- id: STORY-433
  feature: FEAT-180
  title: Enter soft-grace on entitlement breach
  navigation: operator
  narrative:
    as_a: platform admin whose install has just exceeded an entitlement
    i_want: a defined soft-grace window during which traffic continues but the operator sees escalating warnings
    so_that: legitimate production traffic is not cut off the instant a limit is touched
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Enter soft-grace
    given:
    - An entitlement (for example seats) transitions from 99% to 102%
    when:
    - The license-check worker runs
    then:
    - A LicenseIncident is opened with state "soft_grace", the breached entitlement, the observed value and the grace_expires_at computed from the license tier (default 14 days)
    - The in-product banner on every operator page reads "licence over-consumed — N days to resolve"
    - An AuditLog "license.incident.opened" is written
  data_models:
  - LicenseIncident
  - License
  - AuditLog
  non_functional:
  - Tenant traffic is not impacted during soft-grace — the banner is the only visible change
  - When the "license" phone-home channel is enabled the incident is mirrored to Antirion renewals
- id: STORY-434
  feature: FEAT-180
  title: Transition to hard-close and reject tenant traffic
  navigation: operator
  narrative:
    as_a: platform admin whose soft-grace has expired without renewal
    i_want: a predictable hard-close transition that rejects new tenant traffic with 402 while preserving observability and operator access
    so_that: contractual obligations are enforced and diagnostics survive the transition
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Hard-close transition
    given:
    - A LicenseIncident in state "soft_grace" has passed grace_expires_at
    - No renewal-in-flight shield is active
    when:
    - The license-check worker runs
    then:
    - LicenseIncident.state becomes "hard_closed"
    - The gateway begins returning 402 "license_hard_closed" for new tenant requests within the config-reload SLA
    - Operator surfaces, observability, audit, export and break-glass remain available
    - Every tenant Org.primary_contact is notified that traffic is blocked and a clear renewal path is shown
  data_models:
  - LicenseIncident
  - AuditLog
  non_functional:
  - The hard-close transition is reversible the instant a valid license is installed — no operator intervention beyond license install is required to restore service
  - The 402 response includes a Request-Id and a retry-after header so downstream clients can surface the state cleanly
- id: STORY-435
  feature: FEAT-180
  title: Operator override and renewal-in-flight shield
  navigation: operator
  narrative:
    as_a: platform admin managing an active commercial renewal
    i_want: a time-bounded override that extends the grace window and an automatic shield when Antirion confirms the renewal is in-flight
    so_that: a paperwork delay does not cut off production traffic
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Operator override
    given:
    - A LicenseIncident is in state "soft_grace"
    when:
    - I click "Extend grace", type the install id to confirm, enter a reason and a new grace_expires_at within the configured maximum (default +30 days)
    then:
    - grace_expires_at is updated and an AuditLog "license.incident.grace_extended" records actor, reason, old and new timestamp
  - id: AC-002
    scenario: Renewal-in-flight shield
    given:
    - The "license" phone-home channel is enabled
    - Antirion renewals has confirmed an in-flight renewal against the install id
    when:
    - A soft-grace window would otherwise expire
    then:
    - The shield suppresses the hard-close transition for up to a bounded window (default 45 days)
    - The operator banner reads "renewal in flight — hard-close suppressed by Antirion renewals"
    - An AuditLog "license.incident.shielded" records the renewal id and the shield expiry
  data_models:
  - LicenseIncident
  - AuditLog
  non_functional:
  - Override is audited with actor, reason, old and new values
  - The shield is purely additive — an operator can still extend grace manually, and once a valid license is installed both the shield and the incident close
- id: STORY-436
  feature: FEAT-181
  title: Triage an inbound support ticket with tenant context
  navigation: operator
  narrative:
    as_a: Antirion support engineer
    i_want: inbound tickets to arrive with the tenant roster entry and CRM contact card attached
    so_that: I can triage severity and assign without pasting ids across tools
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Ticket lands with context
    given:
    - A tenant submitted a ticket through FEAT-164
    when:
    - I open the ticket in /antirion/support/queue
    then:
    - I see the ticket body plus an embedded panel showing the Org roster row (plan, rolling spend, residency, primary_contact) and the CRM contact card (FEAT-182)
    - The panel's fields are view-only; editing is done in the tenant roster or the CRM
  - id: AC-002
    scenario: Triage and assign
    given:
    - A ticket is in state "new"
    when:
    - I set severity and assignee and click "Triage"
    then:
    - The ticket state becomes "triaged", the SLA timer starts per severity, and an AuditLog "support.ticket.triaged" is written
  ui:
    screens:
    - AntirionConsole
    components:
    - SupportQueue
    - TicketContextPanel
    states:
    - new
    - triaged
    - awaiting_customer
    - resolved
  data_models:
  - SupportTicket
  - Org
  - AuditLog
  non_functional:
  - The support queue is rendered only on the Antirion-staff operator console — it is never exposed on a customer install in either mode
  - Tickets originating from self_hosted installs carry the install id on SupportTicket and the redaction profile applied by FEAT-179
- id: STORY-437
  feature: FEAT-181
  title: Reply to submitter and link an internal engineering issue
  navigation: operator
  narrative:
    as_a: Antirion support engineer
    i_want: to reply to the ticket's submitter and link an internal engineering issue
    so_that: the customer sees a response and engineering has a durable artefact for follow-up
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Reply to submitter
    given:
    - A ticket is open
    when:
    - I write a reply using an optional canned-reply macro and click "Send"
    then:
    - The reply is delivered to the submitter through the same channel the ticket arrived on (tenant in-product inbox, email or webhook)
    - The ticket state advances to "awaiting_customer"
  - id: AC-002
    scenario: Link an engineering issue
    given:
    - A ticket needs an engineering fix
    when:
    - I paste or pick an issue id from the engineering tracker integration
    then:
    - The issue is attached to the ticket and the ticket acquires a "linked_issue" badge
    - Issue closure can emit a "ticket.auto_resolve_suggest" event so support can close the ticket
  data_models:
  - SupportTicket
  - EngineeringIssueLink
  non_functional:
  - Outbound replies inherit the tenant's notification channels — we never bypass the tenant's configured routing
  - Canned replies are templated with explicit variables; replies to self_hosted tickets redact variables not in the channel's data class
- id: STORY-438
  feature: FEAT-181
  title: SLA timers and auto-escalation
  navigation: operator
  narrative:
    as_a: Antirion support lead
    i_want: SLA timers per severity that auto-escalate overdue tickets
    so_that: nothing falls through the cracks on busy days
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Auto-escalate overdue ticket
    given:
    - A severity-1 ticket has been in "triaged" for longer than the severity-1 SLA
    when:
    - The SLA watchdog runs
    then:
    - The ticket is reassigned to the on-call escalation group and severity-1 pager integration fires
    - An AuditLog "support.ticket.escalated" records the prior assignee, the new assignee and the overdue duration
  data_models:
  - SupportTicket
  - AuditLog
  non_functional:
  - SLA thresholds are configurable per severity and are part of the signed release
  - Escalation uses the Antirion-staff pager integration — never the tenant's paging setup
- id: STORY-439
  feature: FEAT-182
  title: View and edit tenant contact fields
  navigation: operator
  narrative:
    as_a: Antirion account manager
    i_want: a CRM card per Org with primary, billing, security and privacy contacts plus renewal dates
    so_that: staff interactions with a tenant are coherent across support, renewals and security
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Open a CRM card
    given:
    - I am on /antirion/crm/orgs/:id
    when:
    - The page loads
    then:
    - I see primary_contact, billing_contact, security_contact, privacy_officer, renewal_date, commitment_end, latest NPS, latest CSAT and links to the roster row, support queue filter and CRM outreach log
  - id: AC-002
    scenario: Edit a contact
    given:
    - I have the CRM edit permission
    when:
    - I update billing_contact and save
    then:
    - The Org row is updated and an AuditLog "crm.contact.updated" records actor, field, before and after
  data_models:
  - Org
  - AuditLog
  non_functional:
  - The CRM surface is rendered only on the Antirion-staff operator console and is never visible on a customer install
  - Contact edits propagate to tenant-side notification routing within the config-reload SLA
- id: STORY-440
  feature: FEAT-182
  title: Log an outreach and schedule a follow-up
  navigation: operator
  narrative:
    as_a: Antirion account manager
    i_want: to record outreach (call, email, meeting) and schedule a follow-up reminder
    so_that: customer relationships are managed deliberately and handovers between staff are lossless
  priority: P2
  acceptance_criteria:
  - id: AC-001
    scenario: Log outreach
    given:
    - I am on a CRM card
    when:
    - I click "Log outreach", pick a type, summarise, attach notes and save
    then:
    - A CrmOutreach row is created and appears on the CRM timeline
    - An AuditLog "crm.outreach.logged" records actor and summary
  - id: AC-002
    scenario: Schedule follow-up
    given:
    - A logged outreach
    when:
    - I set a follow-up date and assignee
    then:
    - A reminder lands in the assignee's in-product inbox on the chosen date
    - Missed follow-ups auto-escalate to the account manager's lead after N days
  data_models:
  - CrmOutreach
  - AuditLog
  non_functional:
  - Outreach logs are retained for the duration of the customer relationship and exported under the FEAT-124 compliance flow on request
  - Follow-up reminders ride the standard notification-delivery worker — no custom path
- id: STORY-441
  feature: FEAT-182
  title: Renewal pipeline and NPS overview
  navigation: operator
  narrative:
    as_a: Antirion head of customer success
    i_want: a dashboard of renewals in the next 90 days, at-risk accounts by NPS and by support-severity trends
    so_that: commercial and relationship risk is visible in one place
  priority: P2
  acceptance_criteria:
  - id: AC-001
    scenario: Renewal pipeline
    given:
    - Orgs have renewal_date values set
    when:
    - I open /antirion/crm/pipeline
    then:
    - I see a board with columns "in 30 days", "in 60 days", "in 90 days" and "overdue"
    - Each card shows Org, plan, rolling spend, latest NPS and any open severity-1 support tickets
  - id: AC-002
    scenario: At-risk heuristic
    given:
    - An Org has NPS below 30 or two severity-1 tickets in the last 30 days
    when:
    - The heuristic worker runs
    then:
    - The Org card shows an "at risk" pill with the heuristic reason
  data_models:
  - Org
  - CrmOutreach
  - SupportTicket
  non_functional:
  - The pipeline reads from operator rollups so request-path latency is never affected
  - All figures are recomputed on a bounded schedule — freshness is bounded rather than real-time
models:
- name: Org
  description: The workspace (organization) that owns everything.
  fields:
  - name: id
    type: uuid
    pk: true
  - name: name
    type: string
  - name: slug
    type: string
    unique: true
  - name: plan
    type: string
  - name: region
    type: string
  - name: seats
    type: int
  - name: seat_cap
    type: int
  - name: billing_contact
    type: string
  - name: tech_contact
    type: string
  - name: security_contact
    type: string
  - name: finance_contact
    type: string
    nullable: true
  - name: privacy_officer
    type: string
    nullable: true
  - name: primary_contact
    type: string
    nullable: true
  - name: timezone
    type: string
  - name: fiscal_year_start
    type: string
    nullable: true
  - name: logo_url
    type: string
    nullable: true
  - name: scheduled_for_deletion
    type: timestamp
    nullable: true
  - name: sso_enforced
    type: bool
    description: When true, password sign-in is blocked for users in require_for_domains
  - name: reporting_currency
    type: string
    description: ISO-4217 code used for aggregated cost reporting
  - name: created_at
    type: timestamp
  relations:
  - type: has_many
    model: User
  - type: has_many
    model: Team
- name: User
  description: A person or service account in the workspace.
  fields:
  - name: id
    type: uuid
    pk: true
  - name: org_id
    type: FK:Org
  - name: team_id
    type: FK:Team
    nullable: true
  - name: email
    type: string
    unique: true
  - name: handle
    type: string
    unique: true
  - name: name
    type: string
  - name: phone
    type: string
    nullable: true
  - name: title
    type: string
    nullable: true
  - name: avatar_hue
    type: int
    nullable: true
  - name: avatar_url
    type: string
    nullable: true
  - name: role
    type: string
    description: owner|admin|developer|analyst|viewer|service|platform_admin (platform_admin is assignable only in self_hosted installs; rejected in saas)
