- id: STORY-023
  feature: FEAT-009
  title: Rate-limit and lock repeated failed sign-ins
  narrative:
    as_a: security engineer
    i_want: repeated failed sign-ins to lock the account and throttle the source IP
    so_that: online password-guessing attacks are contained
  priority: P0
  depends_on:
  - STORY-001
  acceptance_criteria:
  - id: AC-001
    scenario: Account locked after threshold
    given:
    - The SessionPolicy specifies lockout_threshold=5 within lockout_window_minutes=15
    - A User has 4 recent failed attempts
    when:
    - A 5th failed attempt is recorded
    then:
    - User.locked_until is set to now + SessionPolicy.lockout_duration_minutes
    - Further sign-in attempts return 423 Locked with a generic message
    - A LoginAttempt is recorded with outcome "locked"
    - An AuditLog entry is written with action "user.locked" and records the resolved audience list
    - A Notification of kind "security" ("user.locked") is emitted to the target User per project.notifications_model
  - id: AC-002
    scenario: IP throttled independent of user
    given:
    - An IP has 20 failed attempts across multiple emails in 5 minutes
    when:
    - A further attempt arrives from that IP
    then:
    - The request is rejected with 429
    - No LoginAttempt targeting a real user is created on that try
  ui:
    screens:
    - Login
    components:
    - LoginPage
    states:
    - default
    - error
    - locked
  api:
  - method: POST
    path: /api/auth/login
    response:
      error: string
    errors:
    - 401
    - 423
    - 429
  data_models:
  - User
  - LoginAttempt
  - AuditLog
  - SessionPolicy
  - Notification
  non_functional:
  - Thresholds configurable via org-level SessionPolicy (lockout_threshold, lockout_window_minutes, lockout_duration_minutes) with safe defaults
  - Lock decisions must be race-free under concurrent login attempts
