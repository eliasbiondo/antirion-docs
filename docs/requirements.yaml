    then:
    - A card shows "anthropic: 70% rpm, 70% tpm" with colour bands (green <70, amber 70-90, red >90)
    - Hovering reveals the binding layer (provider|byok|model) and which credential is hottest
  - id: AC-002
    scenario: Empty state when limits not configured
    given:
