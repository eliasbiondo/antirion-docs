    - I can click-drag across the histogram to set a min-max range, which applies as min_latency_ms and max_latency_ms filters
    - The 0, mid and max-ms axis labels are shown below the histogram
    - The histogram updates when other filters change
  - id: AC-005
    scenario: Active-filter chips are removable
