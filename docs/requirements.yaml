- id: STORY-199
  feature: FEAT-090
  title: Configure budget rollover at cycle reset
  narrative:
    as_a: finance operations lead
    i_want: to configure what happens to unused budget at cycle end
    so_that: teams keep underspent money or start fresh per our policy
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Reset to zero
    given:
    - A Budget has reset_schedule "reset" and cycle "monthly"
    when:
    - The cycle boundary is crossed
    then:
    - Budget.spent becomes 0
    - rollover_amount becomes 0
    - A BudgetEvent of type "change" with summary "cycle reset" is written
  - id: AC-002
    scenario: Rollover capped balance
    given:
    - Budget.amount=5000, spent=3500, reset_schedule "rollover", rollover_cap=2000
    when:
    - The cycle boundary is crossed
    then:
    - The next cycle starts with available = 5000 + min(5000-3500, 2000) = 6500
    - rollover_amount is set to 1500
  ui:
    screens:
    - Budgets
    components:
    - BudgetEditor
    - CycleSettings
    states:
    - default
  api:
  - method: PUT
    path: /api/budgets/:id/schedule
    request:
      body:
        reset_schedule: string
        rollover_cap: number
    response:
      budget: Budget
    errors:
    - 403
    inferred: true
  data_models:
  - Budget
  - BudgetEvent
  non_functional:
  - Cycle rollover is performed by a single transactional job per org
- id: STORY-200
  feature: FEAT-091
  title: Notify on budget overage
  narrative:
    as_a: finance operations lead
    i_want: to be paged when actual spend exceeds the budget
    so_that: I can react even when soft thresholds did not fire
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Overage triggers notification
    given:
    - A Budget has amount 5000 and spent crosses from 4999 to 5050
    when:
    - The metering pipeline writes the latest bucket
    then:
    - A BudgetEvent of type "overage" is written
    - Notifications are sent to Budget.owner and Org.billing_contact via the configured channels in saas mode
    - In self_hosted mode Org.billing_contact has no meaning against Antirion billing, so the same notification falls back to Org.finance_contact if set else platform admin
    - Sustained overage across the tenant roster in saas mode additionally fans out to Antirion trust_and_safety as an abuse-correlation signal; this branch is silently skipped in self_hosted because the tenant set is 1
    - The notification is deduped for 1 hour on the same Budget
  ui:
    screens:
    - Budgets
    components:
    - OverageBanner
    states:
    - default
    - over
  api:
  - method: GET
    path: /api/budgets/:id/events
    response:
      items: BudgetEvent[]
    errors: []
  data_models:
  - Budget
  - BudgetEvent
  - NotificationPreference
  non_functional:
  - Overage notifications are independent from BudgetPolicy soft_alert_pct
