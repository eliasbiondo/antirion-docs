    when:
    - The response is returned
    then:
    - The response includes X-RateLimit-Limit, X-RateLimit-Remaining, X-RateLimit-Reset for the most restrictive bucket
    - On 429, the response includes Retry-After in seconds
  - id: AC-002
    scenario: Approaching-limit toast in-app
    given:
    - I am signed in and a key I own is at 90% of its minute bucket
    when:
    - I view the Gateway page
    then:
    - A non-intrusive toast shows "Key <last4> nearing rate limit"
  data_models:
  - ApiKey
  non_functional:
  - Every phase (auth, translate, upstream, post-processing) has an explicit timeout; the pipeline is cancellation-safe
  - Additions to this phase must not breach the project performance_slo for gateway-added latency
  - Edge auth and rate-limit decisions complete in under 2 ms p95
- id: STORY-327
  feature: FEAT-139
  title: Retry upstream with exponential backoff and jitter
  narrative:
    as_a: gateway
    i_want: to retry transient upstream failures per rule policy with backoff and jitter
    so_that: flaky providers do not surface as client errors
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Retry on 429
    given:
    - A RoutingRule sets retries=2 with triggers ["429", "5xx"] and base-delay 200 ms
    when:
    - The upstream returns 429 twice, then 200
    then:
    - The gateway issues a total of 3 attempts to the same target
    - Delays between attempts use exponential backoff with full jitter
    - The client receives 200 with the final response body
    - The Request row records 2 retry events in its timeline
  - id: AC-002
    scenario: Do not retry non-idempotent streams
    given:
    - A streaming request has partially streamed bytes to the client
    when:
    - The upstream drops
    then:
    - No retry is attempted on the same target
    - The stream is closed with an error event
  - id: AC-003
    scenario: Retry budget exhausted
    given:
    - The retry count reached the configured max
    when:
    - Another failure occurs
    then:
    - The failure is returned to the client with the original upstream status
    - If a fallback target exists, failover runs instead (STORY-134)
  data_models:
  - RoutingRule
  - Request
  non_functional:
  - Retries respect Retry-After header when present
- id: STORY-328
  feature: FEAT-139
  title: Enforce per-phase timeouts
  narrative:
    as_a: gateway operator
    i_want: separate connect, first-byte and total timeouts per route
    so_that: slow upstreams are cut off predictably
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Connect timeout exceeded
    given:
    - Connect timeout is 2 s
    when:
    - A provider's TCP handshake takes longer than 2 s
    then:
    - The attempt is aborted
    - A retry or fallback runs per policy
  - id: AC-002
    scenario: First-byte timeout exceeded
    given:
    - First-byte timeout is 10 s for non-streaming
    when:
    - The provider does not emit headers or bytes for 10 s
    then:
    - The attempt is aborted
    - The Request is recorded with status 504
  - id: AC-003
    scenario: Stream idle timeout
    given:
    - Stream idle timeout is 30 s on a streaming request
    when:
    - The upstream sends no bytes for 30 s mid-stream
    then:
    - The gateway closes the stream with an error event
  data_models:
  - RoutingRule
  - Request
  non_functional:
  - Every phase (auth, translate, upstream, post-processing) has an explicit timeout; the pipeline is cancellation-safe
  - Additions to this phase must not breach the project performance_slo for gateway-added latency
  - Retry and failover cascades respect the caller's deadline — no retry extends the original timeout
- id: STORY-329
  feature: FEAT-139
  title: Fall back through the target chain on terminal errors
  narrative:
    as_a: gateway
    i_want: to cascade through a rule's fallback chain when the primary fails terminally
    so_that: user-facing success rates stay above SLO
  priority: P0
  depends_on:
  - STORY-327
  acceptance_criteria:
  - id: AC-001
    scenario: Fallback on 5xx
    given:
    - A RoutingRule targets primary "A" with fallback chain ["B","C"]
    - Provider of "A" returns 500
    when:
    - Retries on "A" are exhausted
    then:
    - The gateway issues the translated request against "B"
    - If "B" returns 500 too, it tries "C"
    - The first success is returned to the client
    - The RoutingDecision and Request reflect which target ultimately served it
  - id: AC-002
    scenario: All targets failing
    given:
    - Every target in the chain fails after retries
    when:
    - The gateway exhausts the chain
    then:
    - The client receives 502 with error code "all_targets_failed"
    - A Request is recorded with fallback_attempts equal to chain length
  data_models:
  - RoutingRule
  - RoutingDecision
  - Request
  non_functional:
  - Fallback translation must re-run dialect translation if target uses a different upstream dialect
- id: STORY-330
  feature: FEAT-140
  title: Use BYOK credential for outbound calls
  narrative:
    as_a: gateway
    i_want: outbound calls to use the workspace's BYOK credential for the selected provider
    so_that: billing and rate-limits flow through our negotiated provider accounts
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Active BYOK used
    given:
    - A BYOKCredential for "anthropic" is active
    when:
    - An outbound Anthropic call is made
    then:
    - The call's Authorization header uses this credential
    - The secret never appears in logs or telemetry
  - id: AC-002
    scenario: Missing credential
    given:
    - No BYOKCredential exists for the target provider and the workspace does not allow shared credentials
    when:
    - A request routes to that provider
    then:
    - The response is 503 with error code "no_provider_credential"
    - An AlertEvent of severity "warn" is generated
  data_models:
  - BYOKCredential
  - Request
  - AlertEvent
  non_functional:
  - Secret fetched from the secret store at most once per minute per provider and cached in memory only
- id: STORY-331
  feature: FEAT-140
  title: Sign AWS Bedrock with SigV4 and handle Azure AD
  narrative:
    as_a: gateway
    i_want: provider-specific outbound auth (AWS SigV4 for Bedrock, Azure AD OAuth for Azure OpenAI)
    so_that: those providers work alongside key-based providers
  priority: P1
  depends_on:
  - STORY-330
  acceptance_criteria:
  - id: AC-001
    scenario: Bedrock request is SigV4 signed
    given:
    - A BYOKCredential for "aws-bedrock" holds access_key_id, secret_access_key and session_token
    when:
    - The gateway calls a Bedrock endpoint
    then:
    - The outbound request carries the Authorization header computed via AWS SigV4 over the selected region and service
    - Clock drift within 5 minutes does not break signing
  - id: AC-002
    scenario: Azure AD token rotation
    given:
    - An Azure OpenAI credential has a token with expires_at in 3 minutes
    when:
    - The token is about to expire
    then:
    - The gateway requests a new token via client_credentials flow before expiry
    - Outbound calls switch to the new token with no client-observable failure
  data_models:
  - BYOKCredential
  - Provider
  non_functional:
  - SigV4 uses canonical request/signing-key rules per the AWS spec; no shortcuts
- id: STORY-332
  feature: FEAT-141
  title: Count input and output tokens per response
  narrative:
    as_a: gateway
    i_want: token counts recorded for every completed request
    so_that: cost attribution and rate limits are accurate
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Non-streaming usage
    given:
    - A provider returns usage in its response body
    when:
    - The request completes
    then:
    - The Request.input_tokens and output_tokens match the provider's usage
    - cache_read_input_tokens (if reported) is stored as a field on the Request
  - id: AC-002
    scenario: Streaming usage
    given:
    - A streaming upstream returns usage only in the final event
    when:
    - The stream completes
    then:
    - The gateway accumulates token counts from the final event and writes them to the Request
  - id: AC-003
    scenario: Fallback tokenization
    given:
    - A provider does not report usage
    when:
    - The request completes
    then:
    - The gateway estimates tokens using the model's tokenizer (e.g. tiktoken / anthropic tokenizer)
    - The Request is tagged estimation_method="local_tokenizer"
  data_models:
  - Request
  - Model
  non_functional:
  - Local tokenizers cached and loaded lazily per model family
- id: STORY-333
  feature: FEAT-141
  title: Attribute cost across org, team, project, user and key
  narrative:
    as_a: gateway
    i_want: every Request to record cost and attribute it to org/team/project/user/key at write time
    so_that: budgets, analytics and invoices reconcile without recomputation
  priority: P0
  depends_on:
  - STORY-332
  acceptance_criteria:
  - id: AC-001
    scenario: Cost computed from model pricing
    given:
    - A Model has pricing in_price, out_price and cache_price per 1M tokens (possibly overridden)
    when:
    - A Request completes
    then:
    - cost = (cache_tokens * cache_price + non_cache_input * in_price + output_tokens * out_price) / 1,000,000
    - The Request stores cost, org_id, team_id, project_id, user_id and api_key_id
  - id: AC-002
    scenario: Attribution on downgrade
    given:
    - A RoutingRule downgraded the request to a cheaper model
    when:
    - The Request is written
    then:
    - Cost reflects the model that actually served the request
    - The Request tags include "downgraded" and the originally requested model id
  - id: AC-003
    scenario: Cost headers returned
    given:
    - A successful request
    when:
    - The response is produced
    then:
    - Headers X-Antirion-Cost, X-Antirion-Input-Tokens and X-Antirion-Output-Tokens are set
  data_models:
  - Request
  - Model
  - Team
  - Project
  non_functional:
  - Every phase (auth, translate, upstream, post-processing) has an explicit timeout; the pipeline is cancellation-safe
  - Additions to this phase must not breach the project performance_slo for gateway-added latency
  - Idempotency-Key cache survives node loss and is cluster-wide; duplicate suppression holds under concurrent retries
- id: STORY-334
  feature: FEAT-141
  title: Honor Idempotency-Key for safe retries
  narrative:
    as_a: client that retries after network errors
    i_want: Idempotency-Key to deduplicate in-flight or recently completed requests
    so_that: I do not double-bill or double-act on tool calls
  priority: P0
  depends_on:
  - STORY-312
  acceptance_criteria:
  - id: AC-001
    scenario: Duplicate within window returns cached response
    given:
    - A client sent a request with Idempotency-Key "abc" 30 s ago and received 200
    when:
    - The same client resends the same request body with the same key within a 5-minute window
    then:
    - The gateway returns the cached 200 response
    - No additional upstream call is made
    - No additional Request row is written (or it is flagged idempotency_replay=true)
  - id: AC-002
    scenario: Same key, different body
    given:
    - A key "abc" is already associated with one body hash
    when:
    - A client reuses "abc" with a different body
    then:
    - The response is 409 with error code "idempotency_key_reuse"
  - id: AC-003
    scenario: In-flight dedupe
    given:
    - An Idempotency-Key matches a request that is still in flight
    when:
    - A second request with the same key arrives
    then:
    - The gateway waits for the first request to complete and returns its result
    - The second request does not double-call upstream
  api:
  - method: POST
    path: /v1/chat/completions
    request:
      body:
        model: string
        messages: json
      header:
        Idempotency-Key: string
    errors:
    - 409
    inferred: true
  data_models:
  - Request
  non_functional:
  - Idempotency entries stored in Redis with 5-minute TTL (configurable up to 24h)
  - Body hash uses SHA-256 of a canonical JSON form
- id: STORY-335
  feature: FEAT-142
  title: Probe provider health on a cadence
  narrative:
    as_a: gateway operator
    i_want: the gateway to proactively probe each provider/region endpoint
    so_that: failing regions are detected before user traffic does
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Healthy probe
    given:
    - A Provider has an active BYOKCredential and a cheap probe model
    when:
    - The health probe runs
    then:
    - A ProviderHealth row is updated with status "healthy", latency and last_probed_at
    - The probe is recorded separately and not counted against the workspace's Request totals
  - id: AC-002
    scenario: Failing probe
    given:
    - A provider returns 5xx on consecutive probes
    when:
    - The probe runs again
    then:
    - ProviderHealth.status becomes "degraded" after 2 failures and "down" after 5
    - An AlertEvent of severity "warn" or "crit" is generated with type "provider.down"
  data_models:
  - ProviderHealth
  - Provider
  - AlertEvent
  non_functional:
  - Probe cadence defaults to every 30 s per (provider, region) pair
  - Probes use the cheapest available model for the provider to keep cost negligible
- id: STORY-336
  feature: FEAT-142
  title: Open and close circuit breakers based on health and live error rate
  narrative:
    as_a: gateway
    i_want: circuit breakers to open when a target repeatedly fails and close after a cooldown
    so_that: I stop hammering unhealthy upstreams and waste less latency
  priority: P0
  depends_on:
  - STORY-335
  acceptance_criteria:
  - id: AC-001
    scenario: Breaker opens on error-rate threshold
    given:
    - A provider's live error rate exceeds the configured threshold in the evaluation window
    when:
    - The circuit-breaker evaluator runs
    then:
    - The circuit state for that provider becomes "open"
    - Incoming requests skip that target and go straight to fallback
    - An AlertEvent "circuit.open" is generated
  - id: AC-002
    scenario: Breaker half-open and close
    given:
    - A circuit has been open for the cooldown duration
    when:
    - A next request routes to the provider
    then:
    - The circuit becomes "half-open" and a single probe request is allowed
    - If the probe succeeds, the circuit closes; otherwise it reopens with a longer cooldown
  - id: AC-003
    scenario: Per-model vs per-provider scope
    given:
    - A rule specifies circuit scope "per-model"
    when:
    - One model on a provider is failing while others are healthy
    then:
    - Only the failing model's circuit opens; others stay closed
  data_models:
  - ProviderHealth
  - Provider
  - RoutingRule
  - AlertEvent
  non_functional:
  - Every phase (auth, translate, upstream, post-processing) has an explicit timeout; the pipeline is cancellation-safe
  - Additions to this phase must not breach the project performance_slo for gateway-added latency
  - Circuit-breaker state transitions propagate cluster-wide within 5 seconds
- id: STORY-337
  feature: FEAT-142
  title: Circuit breaker dashboard with manual control
  narrative:
    as_a: gateway operator
    i_want: to see and control circuit breaker state per provider/model
    so_that: I can intervene during incidents
  priority: P1
  depends_on:
  - STORY-336
  acceptance_criteria:
  - id: AC-001
    scenario: Dashboard view
    given:
    - Circuit breakers are active
    when:
    - I open "Circuit breakers"
    then:
    - I see each breaker's current state, window error-rate, time-in-state and the last 10 flips
  - id: AC-002
    scenario: Manual open and close
    given:
    - A breaker is closed
    when:
    - I click "Force open" with a reason and confirm
    then:
    - The breaker opens and traffic skips that target
    - An AuditLog entry records "circuit.manual_open"
  data_models:
  - ProviderHealth
  - AlertEvent
  - AuditLog
  non_functional:
  - Every phase (auth, translate, upstream, post-processing) has an explicit timeout; the pipeline is cancellation-safe
  - Additions to this phase must not breach the project performance_slo for gateway-added latency
  - Circuit-breaker state transitions propagate cluster-wide within 5 seconds
- id: STORY-338
  feature: FEAT-143
  title: Emit OpenTelemetry span and propagate trace context
  narrative:
    as_a: platform engineer
    i_want: every request to produce an OpenTelemetry span and forward trace context upstream
    so_that: end-to-end traces cover the whole path including upstream
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Span emitted
    given:
    - An OpenTelemetry collector endpoint is configured
    when:
    - A request is served
    then:
    - A span "antirion.gateway.request" is exported with attributes model, provider, team, user, api_key_id, cost, input_tokens, output_tokens, latency_ms, ttft_ms
    - Child spans are emitted for dialect translation, outbound call, retry attempts and streaming
  - id: AC-002
    scenario: Inbound traceparent preserved
    given:
    - A client sends "traceparent" and "tracestate" headers
    when:
    - The gateway processes the request
    then:
    - Those headers propagate to the upstream provider's outbound request
    - The span is a child of the client's trace
  - id: AC-003
    scenario: New trace when none provided
    given:
    - No trace context is on the inbound request
    when:
    - The gateway processes it
    then:
    - A new trace is started and a new "traceparent" header is attached to the outbound call
    - The response includes an X-Antirion-Request-Id header mirroring the span id for quick correlation
  api:
  - method: POST
    path: /v1/chat/completions
    request:
      header:
        traceparent: string
        tracestate: string
        X-Antirion-Request-Id: string
    errors: []
    inferred: true
  data_models:
  - Request
  non_functional:
  - OTel exporter is pluggable (OTLP gRPC or HTTP)
  - Sampling configurable; default head-based 10% with parent-based propagation
- id: STORY-339
  feature: FEAT-143
  title: Export Prometheus metrics for ingress
  narrative:
    as_a: SRE
    i_want: Prometheus-compatible metrics at /metrics
    so_that: dashboards and alerting fit our existing tooling
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Scrape endpoint
    given:
    - The gateway exposes /metrics on the internal admin port
    when:
    - Prometheus scrapes the endpoint
    then:
    - Metrics include antirion_requests_total, antirion_request_latency_seconds (histogram), antirion_ttft_seconds, antirion_upstream_errors_total, antirion_tokens_total, antirion_cost_usd_total, antirion_cache_hit_total, antirion_ratelimit_rejections_total
    - Labels include model, provider, team, status_class and env
  - id: AC-002
    scenario: Internal port not publicly exposed
    given:
    - /metrics is bound to an internal listener
    when:
    - A request from the public ingress hits /metrics
    then:
