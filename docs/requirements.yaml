- id: STORY-393
  feature: FEAT-164
  title: Open a support ticket from the shell
  narrative:
    as_a: signed-in user
    i_want: to open a support ticket with context attached
    so_that: the configured support responder can triage without a back-and-forth
  priority: P2
  acceptance_criteria:
  - id: AC-001
    scenario: Submit a ticket in saas
    given:
    - The install is running in saas mode
    - I am on any page
    when:
    - I open "Contact support" from the shell, write a description and submit
    then:
    - A SupportTicket is created with my user_id, org_id, current screen path, recent request_ids and browser info
    - The SupportTicket.destination is "antirion_support_queue" and the ticket is enqueued into FEAT-181
    - I see a confirmation with the ticket id and "Antirion support will reply by email" copy
    - An AuditLog "support.ticket.created" records the resolved destination
  - id: AC-002
    scenario: Submit a ticket in self_hosted with a local support queue only
    given:
    - The install is running in self_hosted mode
    - platform admin has configured support_contact and optional support_webhook
    - The "support" phone-home channel (FEAT-179) is disabled
    when:
    - I open "Contact support" from the shell and submit
    then:
    - A SupportTicket is created with my user_id, org_id, current screen path, recent request_ids and browser info
    - The SupportTicket.destination is "local_only" and the ticket is emailed to support_contact and posted to support_webhook when set
    - I see a confirmation with the ticket id and "Your IT team will reply" copy
    - No outbound call is made to Antirion and an AuditLog "support.ticket.created" records destination "local_only"
  - id: AC-003
    scenario: Submit a ticket in self_hosted with Antirion escalation opted-in
    given:
    - The install is running in self_hosted mode
    - platform admin has enabled the "support" phone-home channel (FEAT-179)
    - The user ticked "Escalate to Antirion" on the dialog
    when:
    - I submit
    then:
    - The SupportTicket.destination is "local_and_antirion"
    - The ticket is routed to the local support_contact and also enqueued into FEAT-181 with a redacted context per FEAT-179 data-minimization rules
    - An AuditLog "support.ticket.created" records both destinations and the redaction profile used
  - id: AC-004
    scenario: Submit a ticket in self_hosted air-gapped
    given:
    - The install is running in self_hosted mode with all phone-home channels disabled
    when:
    - I open "Contact support"
    then:
    - The "Escalate to Antirion" checkbox is hidden and a note explains the install is air-gapped
    - Submission only targets the local queue; no Antirion endpoint is contacted under any failure
  - id: AC-005
    scenario: Attach a specific request
    given:
    - I opened the support dialog from a Request detail
    when:
    - I submit
    then:
    - The SupportTicket.context includes that request_id
  ui:
    screens:
    - Shell
    components:
    - SupportDialog
    states:
    - default
    - submitting
    - submitted
  api:
  - method: POST
    path: /api/support/tickets
    request:
      body:
        subject: string
        body: string
        context: object
    response:
      ticket_id: string
    errors:
