    - I enter name "prod-copilot", type "service", scopes ["chat.completions", "embeddings"], models ["claude-sonnet-4-5", "gpt-5"], rate-limit 2000 rpm / 400000 tpm, TTL 90 days
    - I click "Create"
    then:
