- id: STORY-049
  feature: FEAT-022
  title: Create an API key
  narrative:
    as_a: admin or developer
    i_want: to create a gateway API key with name, type, scopes, models, rate limit and TTL
    so_that: my application can call the gateway
  priority: P0
  depends_on:
  - STORY-011
  acceptance_criteria:
  - id: AC-001
    scenario: Create a service key
    given:
