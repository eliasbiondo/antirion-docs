  epic: EPIC-012
  title: In-product notification inbox
  description: Unified bell-icon inbox of user-visible notifications (alert fires, approvals, job completions, deprecations). In saas mode the inbox additionally surfaces Antirion-originated platform notices — maintenance windows, plan-change confirmations, invoice-ready, security advisories — broadcast by Antirion staff through FEAT-173. In self_hosted mode there are no Antirion platform notices; the same slots are filled by local platform admin broadcasts and by FEAT-175 license events (renewal-approaching, entitlement-breach, fail-closed-warning) and by FEAT-180 license-violation incident events.
  priority: P1
  stories:
  - STORY-402
- id: FEAT-170
  epic: EPIC-013
  title: Cluster and fleet health
  description: Platform-operator surfaces for the running cluster — per-replica health and version across the gateway, control-plane API and worker fleets; drain and cordon controls for graceful shutdown and deploys; queue depth, lag and DLQ depth for every worker queue; and live tracking of config hot-reload propagation across nodes. Available in both saas and self_hosted modes. Visible only to Antirion staff in saas mode and to platform admin in self_hosted mode.
  mode: both
  priority: P0
  stories:
  - STORY-403
  - STORY-404
  - STORY-405
  - STORY-406
- id: FEAT-171
  epic: EPIC-013
  title: Deployment mode and operator gating
  description: Establish the deployment mode (saas or self_hosted) at install time, surface it to every service via config, and gate every EPIC-013 surface on mode plus role at the edge so tenant workspaces cannot reach operator-only screens or endpoints. Available in both modes.
  mode: both
  priority: P0
  stories:
  - STORY-407
  - STORY-408
- id: FEAT-172
  epic: EPIC-013
  title: Tenant roster
  description: Operator-wide roster of every Org on the platform with plan, seat count, rolling spend, incident flags, residency region and primary contact, plus the ability to drill into a tenant and to suspend one with audit. Available in saas mode only; in self_hosted the view degenerates to a single-row read-only summary of the local install.
  mode: both
  priority: P0
  stories:
  - STORY-409
  - STORY-410
  - STORY-411
- id: FEAT-173
  epic: EPIC-013
  title: Platform-wide incident and maintenance
  description: Let the operator declare a platform incident, pick affected regions and components and a severity, compute the affected tenants from the routing table, and broadcast in real time to every affected tenant's in-app status widget (FEAT-164). Also lets the operator schedule maintenance windows with advance notice. Available in both saas and self_hosted modes — in saas Antirion staff declare incidents for the fleet, in self_hosted the platform admin declares them for the local install.
  mode: both
  priority: P0
  stories:
  - STORY-412
  - STORY-413
  - STORY-414
- id: FEAT-174
  epic: EPIC-013
  title: Release and fleet version management
  description: Promote a build across the fleet × region matrix, stage canaries, watch SLO impact in near-real time, and roll back on breach. Available in both modes — in saas Antirion staff drive it, in self_hosted the platform admin does.
  mode: both
  priority: P0
  stories:
  - STORY-415
  - STORY-416
  - STORY-417
- id: FEAT-175
  epic: EPIC-013
  title: Self-hosted license and entitlement
  description: Install, inspect and renew the Antirion license in a self_hosted deployment; show entitlement limits (seats, sustained rps, retention days, enabled feature set) and their consumption; fail closed on expiry or over-consumption with a clear path to renew. Available in self_hosted mode only; in saas mode the feature is inapplicable and its surfaces return 404.
  mode: self_hosted
  priority: P0
  stories:
  - STORY-418
  - STORY-419
  - STORY-420
- id: FEAT-176
  epic: EPIC-013
  title: Platform-wide abuse and isolation signals
  description: Operator-facing dashboards for noisy-neighbor risk, abuse heuristics and the running results of FEAT-134 tenant-isolation verification. In saas mode this aggregates across tenants; in self_hosted it degenerates to a single-tenant view.
  mode: both
  priority: P1
  stories:
  - STORY-421
  - STORY-422
- id: FEAT-177
  epic: EPIC-013
  title: Self-hosted install wizard
  description: First-boot wizard that brings a fresh self_hosted install to a usable state — TLS certificates, external Postgres/Redis/ClickHouse/object-store/queue-broker wiring and connectivity checks, SSO identity-provider configuration, platform admin account and password bootstrap, residency label pinning (feeds FEAT-112), license install (delegates to FEAT-175) and initial Org creation. The wizard is the precondition for FEAT-162 onboarding and FEAT-171 operator gating; the control plane refuses tenant traffic until the wizard has reported "complete". Available in self_hosted mode only; in saas mode every wizard endpoint and screen returns 404 because the equivalent wiring is Antirion staff's operational concern, not a customer surface.
  mode: self_hosted
  priority: P0
  stories:
  - STORY-423
  - STORY-424
  - STORY-425
  - STORY-426
- id: FEAT-178
  epic: EPIC-013
  title: Self-hosted upgrade and migration runbook
  description: Operator-facing upgrade surface for self_hosted installs — version channels (stable, extended support), schema-migration gate that enforces the non-functional baseline's one-release backward-compatibility window, pre-flight health check, rendered changelog, air-gapped artefact import path for offline installs, staged roll-forward across the fleet × region matrix and a rollback plan. Complements FEAT-174, which covers build promotion and canary/rollback at runtime; this feature covers the on-prem artefact acquisition and schema-migration gating that saas does not need. Available in self_hosted mode only.
  mode: self_hosted
  priority: P0
  stories:
  - STORY-427
  - STORY-428
  - STORY-429
- id: FEAT-179
  epic: EPIC-013
  title: Telemetry and phone-home controls
  description: Govern every outbound call from an Antirion install back to Antirion-operated endpoints. Named channels are license (license heartbeat and entitlement-usage rollup), metrics (anonymous aggregate usage for product analytics), crash (crash reports with symbol frames), security (trust_and_safety signals — key-leak events, tenant-isolation breaches, break-glass usage), support (escalation path for FEAT-164) and docs (catalog refresh for FEAT-166). Each channel has an independent opt-out, a documented payload schema (with per-field data class), a documented retention policy at Antirion and an outbound-request audit in the local AuditLog. An explicit air-gapped pin disables every channel and is enforced at the egress layer — any compiled code that attempts an Antirion-endpoint call when air-gapped is a test-suite failure. Available in both modes — saas forces every channel on (the tenant is by definition talking to Antirion), and self_hosted defaults channels off for the ENTERPRISE
    license tier and on for the CLOUD-ASSIST license tier.
  mode: both
  priority: P0
  stories:
  - STORY-430
  - STORY-431
  - STORY-432
- id: FEAT-180
  epic: EPIC-013
  title: License-violation incident flow
  description: The defined flow for handling over-consumption beyond an installed license entitlement (seats, sustained rps, retention days, feature set) or operation past license expiry. Defines the soft-grace window (default 14 days, configurable per license tier at issue time) during which the operator sees escalating warnings but traffic continues, the hard-close transition where the control plane begins rejecting new tenant traffic with 402 while preserving observability, the operator override workflow (typed confirmation, reason, time-bounded) to extend the grace window during an active renewal, the renewal-in-flight shield that suppresses hard-close when the "license" phone-home channel under FEAT-179 has confirmed an in-flight renewal with Antirion, and the audit and restore-of-service flow once a valid license is reinstalled. Complements FEAT-175 (which declares "fail closed" as a policy) by defining the specific incident states and transitions. Available in self_hosted mode only.
  mode: self_hosted
  priority: P0
  stories:
  - STORY-433
  - STORY-434
  - STORY-435
- id: FEAT-181
  epic: EPIC-013
  title: Antirion-side inbound support queue
  description: The Antirion-staff counterpart of FEAT-164 — the queue that receives tickets submitted by saas tenants and by self_hosted tenants who have opted in to Antirion escalation under FEAT-179. Supports triage (severity, SLA timer, assignee), link to tenant context pulled from FEAT-172 tenant roster and FEAT-182 CRM, canned replies, conversation thread with the submitter, and escalation into Antirion engineering with a linked internal issue. Surfaces live on the Antirion-staff console only. Available in saas mode on every install; in self_hosted mode the feature is installed only on Antirion's own operator console and is never rendered on customer installs.
  mode: saas
  priority: P1
  stories:
  - STORY-436
  - STORY-437
  - STORY-438
- id: FEAT-182
  epic: EPIC-013
  title: Antirion platform CRM and tenant contact book
  description: Antirion-staff CRM that complements FEAT-172. For every Org on the saas platform it stores the primary, billing, security and privacy contacts, outreach history, renewal and commitment dates, NPS and CSAT, and cross-links to the support queue (FEAT-181) and the tenant detail view (FEAT-172). Lets Antirion staff record an outreach, schedule a follow-up, attach meeting notes and trigger the tenant-contact audit trail so every staff interaction with a tenant's primary contact is evidenced. In self_hosted mode for Antirion's internal tracking of its own customers this CRM runs only on Antirion's operator console and carries one row per self_hosted install that has opted in to the "license" phone-home channel under FEAT-179; on a customer install itself, this surface is never rendered. Available in saas mode on every install, and on Antirion's own operator console for self_hosted tracking.
  mode: saas
  priority: P1
  stories:
  - STORY-439
  - STORY-440
  - STORY-441
stories:
- id: STORY-001
  feature: FEAT-001
  title: Sign in with email and password
  narrative:
    as_a: registered member
    i_want: to sign in with my work email and password
    so_that: I can access my workspace
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Successful sign-in
    given:
    - A User exists with email "priya.okonkwo@acme.example" and the correct password
    - I am on /login
    when:
    - I enter "priya.okonkwo@acme.example" as email
    - I enter my correct password
    - I click "Sign in"
    then:
    - A Session is created for the user
    - I am redirected to /gateway
    - I see my name in the top-right user menu
  - id: AC-002
    scenario: Invalid credentials
    given:
    - I am on /login
    when:
    - I submit the form with an unknown email or wrong password
    then:
    - I see a generic error "Invalid email or password"
    - No information is leaked about whether the email exists
    - No Session is created
  - id: AC-003
    scenario: Empty fields
    given:
    - I am on /login
    when:
    - I submit the form with email or password empty
    then:
    - I see the inline error "Enter both email and password"
    - The card shakes briefly to draw attention
  ui:
    screens:
    - Login
    components:
    - LoginPage
    - Icon
    - BrandLogo
    states:
    - default
    - error
    - submitting
  api:
  - method: POST
    path: /api/auth/login
    request:
      body:
        email: string
        password: string
        remember_device: bool
    response:
      token: string
      user: User
    errors:
    - 400
    - 401
    - 429
  data_models:
  - User
  - Session
  non_functional:
  - Passwords hashed with argon2id (memory >= 64 MiB, time >= 3, parallelism >= 4)
  - Rate limit login attempts per email and per IP
  - Generic error to prevent user enumeration
- id: STORY-002
  feature: FEAT-001
  title: Trust this device for 30 days
  narrative:
    as_a: signed-in user
    i_want: to trust the current browser for 30 days
    so_that: I do not have to re-enter MFA on every sign-in
  priority: P1
  depends_on:
  - STORY-001
  acceptance_criteria:
  - id: AC-001
    scenario: Enable trust on sign-in
    given:
    - I am signing in successfully
    - The "Trust this device for 30 days" box is checked
    when:
    - The sign-in completes
    then:
    - A TrustedBrowser record is created with a 30-day expiry
    - My next sign-in from this browser within 30 days does not prompt for MFA
  ui:
    screens:
    - Login
    components:
    - LoginPage
    states:
    - default
  api:
  - method: POST
    path: /api/auth/login
    request:
      body:
        email: string
        password: string
        remember_device: bool
    response:
      token: string
      user: User
      trusted_until: timestamp
    errors:
    - 401
    - 429
  data_models:
  - User
  - Session
  - TrustedBrowser
  non_functional:
  - Trust cookie flags HttpOnly, Secure and SameSite=Lax; scoped to the app domain
  - TrustedBrowser fingerprint is stable across reboots and expires at 30 days maximum
  - Trust is revoked on password change, MFA reset or admin session revocation
- id: STORY-003
  feature: FEAT-001
  title: Request password reset
  narrative:
    as_a: member who forgot their password
    i_want: to request a reset email
    so_that: I can set a new password and sign in
  priority: P0
  depends_on:
  - STORY-001
  acceptance_criteria:
  - id: AC-001
    scenario: Request reset for known email
    given:
    - A User exists with email "priya.okonkwo@acme.example"
    when:
    - I click "Forgot?" on the password field
    - I submit my email
    then:
    - A PasswordResetToken is created with a 30-minute expiry
    - A reset email is sent to my address
    - I see "If that account exists, we sent a reset link"
  - id: AC-002
    scenario: Request reset for unknown email
    given:
    - No User exists with email "nobody@example.com"
    when:
    - I submit "nobody@example.com"
    then:
    - No PasswordResetToken is created
    - I see the same generic confirmation message
  ui:
    screens:
    - Login
    components:
    - LoginPage
    states:
    - default
    - submitting
  api:
  - method: POST
    path: /api/auth/password/reset
    request:
      body:
        email: string
    response:
      ok: bool
    errors:
    - 429
    inferred: true
  data_models:
  - User
  - PasswordResetToken
  non_functional:
  - Always return a uniform response to prevent enumeration
  - Tokens single-use and invalidated after use
- id: STORY-004
  feature: FEAT-002
  title: Sign in via SSO provider
  narrative:
    as_a: member whose workspace has SSO configured
    i_want: to sign in with Google, Microsoft, Okta or GitHub
    so_that: I do not manage a separate password
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Successful OIDC sign-in
    given:
    - The workspace has SSO enabled with provider "okta"
    - I am on /login
    when:
    - I click "Continue with Okta"
    - I authenticate in the IdP and return to the app
    then:
    - A Session is created linked to my SSO subject
    - I am redirected to /gateway
  - id: AC-002
    scenario: SSO-only domain blocks password login
    given:
    - The workspace enforces SSO for domain "acme.example"
    when:
    - I try to sign in with email "priya.okonkwo@acme.example" and a password
    then:
    - I see "This workspace requires SSO sign-in for @acme.example"
    - No Session is created
  ui:
    screens:
    - Login
    components:
    - LoginPage
    - ProviderMark
    states:
    - default
    - submitting
    - error
  api:
  - method: GET
    path: /api/auth/sso/:provider/start
    response:
      redirect_url: string
    errors:
    - 404
    inferred: true
  - method: GET
    path: /api/auth/sso/:provider/callback
    request:
      query:
        code: string
        state: string
    response:
      token: string
      user: User
    errors:
    - 400
    - 401
    inferred: true
  data_models:
  - User
  - Session
  - SsoConfig
  non_functional:
  - State parameter validated to prevent CSRF on OAuth callback
  - SAML assertions validated against signing cert
- id: STORY-005
  feature: FEAT-002
  title: Just-in-time user provisioning on first SSO sign-in
  narrative:
    as_a: workspace admin
    i_want: new employees to get a User record the first time they sign in via SSO
    so_that: I do not have to pre-create every account
  priority: P1
  depends_on:
  - STORY-004
  acceptance_criteria:
  - id: AC-001
    scenario: JIT creates a User on first sign-in
    given:
    - SSO is enabled with JIT mode "auto" and default role "developer"
    - No User exists for SSO subject "priya.okonkwo@acme.example"
    when:
    - The user completes SSO sign-in for the first time
    then:
    - A User is created with role "developer"
    - An audit log entry records "user.provisioned" with actor "sso"
  data_models:
  - User
  - SsoConfig
  - AuditLog
  non_functional:
  - Membership and role changes are audited with actor, subject, timestamp and before/after
  - Revocations and role changes propagate to every node within the config-reload SLA
  - SSO assertion signature, audience and NotOnOrAfter validated on every callback
- id: STORY-006
  feature: FEAT-003
  title: Sign out and revoke other sessions
  narrative:
    as_a: signed-in user
    i_want: to sign out everywhere else from my account panel
    so_that: I can kick out a lost device immediately
  priority: P0
  depends_on:
  - STORY-001
  acceptance_criteria:
  - id: AC-001
    scenario: Sign out from current device
    given:
    - I have an active Session
    when:
    - I click "Sign out" in the user menu
    then:
    - The current Session is revoked
    - I am redirected to /login
  - id: AC-002
    scenario: Revoke one other session
    given:
    - I have four active Sessions, one marked current
    when:
    - I click "Revoke" on a non-current session in Account -> Active sessions
    then:
    - That Session is deleted server-side
    - The row is removed from the list
    - The other Sessions remain unaffected
  - id: AC-003
    scenario: Sign out everywhere else
    given:
    - I have four active Sessions, one marked current
    when:
    - I click "Sign out everywhere else"
    then:
    - All non-current Sessions are revoked
    - Only the current session remains in the list
  ui:
    screens:
    - Account
    components:
    - AccountDialog
    - SessionsSection
    states:
    - default
    - confirming
  api:
  - method: DELETE
    path: /api/sessions/:id
    response:
      ok: bool
    errors:
    - 401
    - 404
    inferred: true
  - method: POST
    path: /api/sessions/revoke-others
    response:
      revoked: int
    errors:
    - 401
    inferred: true
  data_models:
  - User
  - Session
  non_functional:
  - Membership and role changes are audited with actor, subject, timestamp and before/after
  - Revocations and role changes propagate to every node within the config-reload SLA
- id: STORY-007
  feature: FEAT-004
  title: Invite a new member
  narrative:
    as_a: workspace admin
    i_want: to invite a teammate by email with a role and team
    so_that: they can join the workspace
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Send a new invite
    given:
    - I am an admin on /teams-users in the People tab
    when:
    - I click "Invite user"
    - I enter "alex.chen@acme.example" as email
    - I pick role "developer" and team "Platform"
    - I click "Send invite"
    then:
    - An Invite is created with 7-day expiry
    - An invite email is sent to alex.chen@acme.example
    - The user appears in the list with status "pending"
  - id: AC-002
    scenario: Duplicate invite blocked
    given:
    - An Invite already exists for alex.chen@acme.example
    when:
    - I submit another invite for the same address
    then:
    - I see "This address already has a pending invite"
    - No new Invite is created
  ui:
    screens:
    - Teams & Users
    components:
    - TeamsUsersPage
    - InviteModal
    states:
    - default
    - submitting
    - error
  api:
  - method: POST
    path: /api/invites
    request:
      body:
        email: string
        role: string
        team_id: uuid
    response:
      invite: Invite
    errors:
    - 400
    - 409
    inferred: true
  data_models:
  - User
  - Invite
  - Team
  non_functional:
  - Invites expire after 7 days by default (configurable per workspace)
- id: STORY-008
  feature: FEAT-004
  title: Accept an invite
  narrative:
    as_a: invited person
    i_want: to accept the invite by clicking the emailed link
    so_that: I can join the workspace and sign in
  priority: P0
  depends_on:
  - STORY-007
  acceptance_criteria:
  - id: AC-001
    scenario: Accept a valid invite
    given:
    - A pending Invite exists for me with a non-expired token
    when:
    - I open the emailed link
    - I set a password (or complete SSO)
    then:
    - A User is created with the invited role and team
    - The Invite is marked "accepted"
    - I am signed in and redirected to /gateway
  - id: AC-002
    scenario: Expired invite
    given:
    - An Invite exists for me with expires_at in the past
    when:
    - I open the emailed link
    then:
    - I see "This invite has expired — ask your admin to resend"
    - No User is created
  data_models:
  - User
  - Invite
  - Team
  non_functional:
  - Membership and role changes are audited with actor, subject, timestamp and before/after
  - Revocations and role changes propagate to every node within the config-reload SLA
  - Invite tokens are single-use, >= 128 bits of entropy, and expire within 7 days
- id: STORY-009
  feature: FEAT-004
  title: Resend a pending invite
  narrative:
    as_a: admin
    i_want: to resend an invite email for a pending invitation
    so_that: invited people who lost the original can still accept
  priority: P1
  depends_on:
  - STORY-007
  acceptance_criteria:
  - id: AC-001
    scenario: Resend refreshes expiry
    given:
    - A pending Invite exists for "alex.chen@acme.example" expiring in 2 days
    when:
    - I click "Resend invite" on the row
    then:
    - A new invite email is sent
    - The Invite.expires_at is pushed to 7 days from now
    - An AuditLog entry records actor and action "invite.resend"
  - id: AC-002
    scenario: Resend blocked for accepted invite
    given:
    - An accepted Invite exists for "alex.chen@acme.example"
    when:
    - I try to resend it
    then:
    - I see "That invite was already accepted"
    - No email is sent
  api:
  - method: POST
    path: /api/invites/:id/resend
    response:
      invite: Invite
    errors:
    - 400
    - 401
    - 403
    - 404
    - 409
    inferred: true
  data_models:
  - Invite
  - AuditLog
  non_functional:
  - Membership and role changes are audited with actor, subject, timestamp and before/after
  - Revocations and role changes propagate to every node within the config-reload SLA
  - Invite tokens are single-use, >= 128 bits of entropy, and expire within 7 days
- id: STORY-010
  feature: FEAT-004
  title: Revoke a pending invite
  narrative:
    as_a: admin
    i_want: to revoke an invitation that is no longer wanted
    so_that: it cannot be accepted later
  priority: P1
  depends_on:
  - STORY-007
  acceptance_criteria:
  - id: AC-001
    scenario: Revoke a pending invite
    given:
    - A pending Invite exists for "alex.chen@acme.example"
    when:
    - I click "Revoke" on the row and confirm
    then:
    - The Invite status becomes "revoked"
    - Attempts to accept the original link return 410
    - An AuditLog entry records actor and action "invite.revoke"
  api:
  - method: DELETE
    path: /api/invites/:id
    response:
      ok: bool
    errors:
    - 401
    - 403
    - 404
    inferred: true
  data_models:
  - Invite
  - AuditLog
  non_functional:
  - Membership and role changes are audited with actor, subject, timestamp and before/after
  - Revocations and role changes propagate to every node within the config-reload SLA
  - Invite tokens are single-use, >= 128 bits of entropy, and expire within 7 days
- id: STORY-011
  feature: FEAT-005
  title: Enforce role-based scopes
  narrative:
    as_a: security lead
    i_want: each role to have a fixed set of scopes
    so_that: no viewer can accidentally rotate keys or edit policies
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Viewer cannot create an API key
    given:
    - I am signed in as a user with role "viewer"
    when:
    - I call POST /api/keys
    then:
    - The response is 403
    - No ApiKey is created
  - id: AC-002
    scenario: Admin can edit teams
    given:
    - I am signed in as a user with role "admin"
    when:
    - I call PATCH /api/teams/:id
    then:
    - The response is 200
    - The team record is updated
  - id: AC-003
    scenario: Owner has wildcard scope
    given:
    - I am signed in as a user with role "owner"
    when:
    - I call any write endpoint in the workspace
    then:
    - The request is authorized
  data_models:
  - User
  - Role
  non_functional:
  - Levels per Role.level; writes gated by level
  - Scopes checked server-side on every mutating endpoint
- id: STORY-012
  feature: FEAT-005
  title: Change a user's role
  narrative:
    as_a: admin
