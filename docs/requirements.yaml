    so_that: we can act during an incident with elevated scope
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Create
    given:
    - An incident is declared
    when:
    - I click "Create break-glass key" with reason and duration
    then:
    - An Approval of kind "key-elevated-scope" is created for the break-glass key
    - A creation notification is sent to Org.security_contact (falling back to Org.owner in saas and platform admin in self_hosted)
    - In saas mode the creation event additionally notifies Antirion trust_and_safety at severity "warn" so Antirion staff can observe elevated access in-flight; in self_hosted this fanout is skipped unless the "security" phone-home channel (FEAT-179) is enabled
  data_models:
  - ApiKey
  - Approval
  non_functional:
