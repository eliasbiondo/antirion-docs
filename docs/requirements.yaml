- id: STORY-184
  feature: FEAT-082
  title: View org-wide budget health
  narrative:
    as_a: finance operations lead
    i_want: one dashboard with total budget, total spent, at-risk teams and enforced-today count
    so_that: I can manage spend at the org level
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Populated dashboard
    given:
    - The workspace has budgets set for several teams
    when:
    - I open /budgets
    then:
    - I see total budget, total spent, total projected, at-risk team count and enforced-today count
    - I see a card per team with state (ok/warn/over/blocked)
  - id: AC-002
    scenario: No budgets configured
    given:
    - No Budget records exist
    when:
    - I open /budgets
    then:
    - The empty state "Create your first budget" is shown
    - A CTA opens the create-budget modal
  ui:
    screens:
    - Budgets
    components:
    - BudgetsPage
    - TeamCard
    - BudgetEventList
    states:
    - loading
    - populated
    - empty
  api:
  - method: GET
    path: /api/budgets/org
    response:
      totals: json
      teams:
      - Budget
    errors:
    - 401
    inferred: true
  data_models:
  - Budget
  - Team
  non_functional:
  - Dashboard reads roll up MTD spend from the Request stream (materialized daily + intraday cache)
- id: STORY-185
  feature: FEAT-082
  title: Drill into a team budget
  narrative:
    as_a: team lead
    i_want: to drill into my team's budget with projects and users
    so_that: I know who is burning it
  priority: P0
  depends_on:
  - STORY-184
  acceptance_criteria:
  - id: AC-001
    scenario: Team detail
    given:
    - A team "copilot" with budget 120000 and projects/users
    when:
    - I click the team card
    then:
    - I see MTD spend, projected month-end spend, daily burn, 7d burn and days-left
    - I see projects and users sorted by spend
  api:
  - method: GET
    path: /api/budgets/teams/:id
    response:
      team: Budget
      projects:
      - Project
      users:
      - UserBudget
    errors:
    - 401
    - 403
    - 404
    inferred: true
  data_models:
  - Budget
  - Team
  - Project
  - UserBudget
  non_functional:
  - Budget counters live in the shared limiter store; enforcement decisions complete in under 5 ms p95
  - Counter reconciliation runs on a worker cadence; drift between live counters and ledger alerts
  - Budget evaluation is shared-state and survives node loss
- id: STORY-186
  feature: FEAT-082
  title: Create a budget
  narrative:
    as_a: finance operations lead
    i_want: to create a budget for the org, a team, project or user
    so_that: spend is constrained per scope
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Create team budget
    given:
    - I am on /budgets and click "New budget"
    when:
    - I pick scope "team", scope_id "copilot", amount 120000, cycle "monthly"
    - I click Create
    then:
    - A Budget is created for the current cycle
    - The team card appears in the org dashboard
    - An AuditLog entry records actor and action "budget.create"
  - id: AC-002
    scenario: Duplicate scope prevented
    given:
    - A Budget already exists for scope "team" and scope_id "copilot" in the current cycle
    when:
    - I try to create another with the same scope
    then:
    - I see "A budget already exists for this scope"
    - No duplicate is created
  ui:
    screens:
    - Budgets
    components:
    - NewBudgetModal
    states:
    - default
    - submitting
    - error
  api:
  - method: POST
    path: /api/budgets
    request:
      body:
        scope: string
        scope_id: uuid
        amount: number
        cycle: string
        owner_user_id: uuid
    response:
      budget: Budget
    errors:
    - 400
    - 401
    - 403
    - 409
    inferred: true
  data_models:
  - Budget
  - Team
  - AuditLog
  non_functional:
  - Budget counters live in the shared limiter store; enforcement decisions complete in under 5 ms p95
  - Counter reconciliation runs on a worker cadence; drift between live counters and ledger alerts
  - Budget evaluation is shared-state and survives node loss
- id: STORY-187
  feature: FEAT-082
  title: Reconcile direct-waiver and Approval-based budget paths
  narrative:
    as_a: finance operations lead
    i_want: the behavior of direct-waiver (STORY-088) and Approval-based waivers (STORY-091) to be clearly separated by threshold
    so_that: small waivers are fast and big waivers are governed
  priority: P1
  acceptance_criteria:
  - id: AC-001
    scenario: Small waiver uses direct path
    given:
    - BudgetPolicy.approval_threshold_pct is 50
    - Requested waiver is 20% over current budget
    when:
    - The finance lead grants the waiver
    then:
    - A BudgetEvent of type "waiver" is written directly with no Approval
  - id: AC-002
    scenario: Large waiver requires approval
    given:
    - BudgetPolicy.approval_threshold_pct is 50
    - Requested waiver is 70%
    when:
    - The finance lead submits it
    then:
    - An Approval of kind "budget-overage" is created
    - The BudgetEvent is only written after the Approval is approved
  data_models:
  - Budget
  - BudgetPolicy
  - BudgetEvent
  - Approval
  non_functional:
  - Budget counters live in the shared limiter store; enforcement decisions complete in under 5 ms p95
  - Counter reconciliation runs on a worker cadence; drift between live counters and ledger alerts
  - Budget evaluation is shared-state and survives node loss
