- id: STORY-320
  feature: FEAT-137
  title: Translate OpenAI chat requests to Anthropic Messages and back
  narrative:
    as_a: application that speaks OpenAI chat natively
    i_want: Antirion to route my request to an Anthropic upstream when routing policy says so
    so_that: I can use Anthropic models without rewriting my client
  priority: P0
  depends_on:
  - STORY-312
  - STORY-318
  acceptance_criteria:
  - id: AC-001
    scenario: OpenAI in, Anthropic out
    given:
    - A client sends POST /v1/chat/completions with model "claude-sonnet-4-5"
    - Routing policy targets the Anthropic provider for this request
    when:
    - The gateway processes the request
    then:
    - The outbound call uses the Anthropic Messages schema (system extracted from first system message; messages[] preserved)
    - The upstream response is translated back into chat.completion shape
    - choices[0].message.content carries the response text
    - usage maps Anthropic input/output/cache tokens to OpenAI prompt_tokens/completion_tokens
  - id: AC-002
    scenario: Anthropic in, OpenAI out
    given:
    - A client sends POST /v1/messages with model "gpt-5"
    - Routing policy targets the OpenAI provider
    when:
    - The gateway processes the request
    then:
    - The outbound call uses the OpenAI chat.completion schema
    - The response is translated back to Anthropic Messages shape
  api:
  - method: POST
    path: /v1/chat/completions
    request:
      body:
        model: string
        messages: json
    response:
      choices: json
      usage: json
    errors:
    - 400
    - 401
    - 502
    - 504
    inferred: true
  data_models:
  - Request
  - Model
  non_functional:
  - Translation is deterministic and reversible for supported features
  - Unsupported features return a 400 with a clear "unsupported_in_target_dialect" error
