  - id: AC-001
    scenario: Request an export
    given:
    - I am on /account/security
    when:
    - I click "Request data export"
    - I confirm with my current password or MFA
    then:
    - A DataExportJob is created with status "queued" and scope "user"
    - I see a banner "Your export will be ready by email within 24 hours"
    - An AuditLog entry is written with action "user.data_export.requested"
  - id: AC-002
    scenario: Download when ready
    given:
    - My DataExportJob has status "ready" and a signed download URL
    when:
    - I click the email link within the 7-day expiry window
    then:
    - I receive a ZIP archive containing profile.json, sessions.json, tokens.json, audit.json
    - The signed URL expires after first successful download
  ui:
    screens:
    - Account
    components:
    - SecurityPanel
    - Banner
    states:
    - default
    - requested
    - ready
