  feature: FEAT-160
  title: Use break-glass key with full audit
  narrative:
    as_a: incident commander
    i_want: the key to be usable and every use audited
    so_that: elevated actions during an incident remain fully traceable
  priority: P1
  depends_on:
  - STORY-377
  acceptance_criteria:
  - id: AC-001
    scenario: Use key
    given:
    - A break-glass ApiKey is active
    when:
    - It is used
    then:
    - Every request is tagged break_glass=true
    - An AuditLog entry records each use
    - First-use within an incident emits a notification to Org.security_contact (falling back to Org.owner in saas and platform admin in self_hosted); in saas mode the same event also fans out to Antirion trust_and_safety
    - Subsequent uses are aggregated into a 15-minute dedupe window on the same key so the audit trail is complete while the notification channel is not flooded
  data_models:
  - ApiKey
  - Request
  - AuditLog
  non_functional:
