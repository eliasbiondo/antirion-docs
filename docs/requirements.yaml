- id: STORY-341
  feature: FEAT-144
  title: Stream tokens end-to-end across any dialect
  narrative:
    as_a: application developer
    i_want: server-sent event streaming to pass through without buffering
    so_that: my UX stays responsive
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: OpenAI-style SSE in, Anthropic-style upstream
    given:
    - A client requests /v1/chat/completions with stream=true
    - The resolved model is Anthropic and returns event-stream chunks
    when:
    - The upstream emits chunks
    then:
    - The gateway translates each chunk to OpenAI's SSE format in under 10 ms
    - Keep-alive comments are sent every 15 seconds during silence
    - On upstream error mid-stream, an "error" SSE event is emitted before close
  - id: AC-002
    scenario: ttft measured on first chunk
    given:
    - The upstream returns the first chunk 400 ms after request start
    when:
    - The gateway forwards it
    then:
    - Request.ttft_ms is set to ~400
    - Request.streamed is true
  api:
  - method: POST
    path: /v1/chat/completions
    request:
      body:
        stream: bool
        model: string
    response:
      sse: stream
    errors:
    - 502
    - 504
  data_models:
  - Request
  non_functional:
  - No response body is buffered; chunks forwarded within one CPU tick
  - Back-pressure propagates to the upstream client if the downstream stalls
- id: STORY-342
  feature: FEAT-145
  title: Accept multimodal content parts
  narrative:
    as_a: application developer
    i_want: to send image, audio and file content parts
    so_that: a single endpoint handles multimodal workloads
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Image part on ingress
    given:
    - A client sends a content part of type "image_url" or base64 image
    when:
    - The gateway routes to an upstream that accepts images
    then:
    - The image is translated to the upstream's representation (URL or base64 with mime type)
    - Per-request image count and bytes contribute to size limits
    - Request.input_tokens and input_cost include image tokens per the provider's tokenizer
  - id: AC-002
    scenario: Model without multimodal support
    given:
    - The resolved model's modality is "text"
    when:
    - A content part of type "image" is included
    then:
    - The request is rejected with 400 and an explanatory body
    - The content bytes are not forwarded upstream
  api:
  - method: POST
    path: /v1/chat/completions
    request:
      body:
        messages:
          content: object[]
    errors:
    - 400
    - 413
  data_models:
  - Request
  - Model
  non_functional:
  - Attachments are streamed to upstream; not persisted beyond retention policy
- id: STORY-343
  feature: FEAT-146
  title: Preserve tool calls when translating across dialects
  narrative:
    as_a: application developer
    i_want: my tool definitions and tool_use/tool_result turns preserved
    so_that: agents keep working across providers
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: OpenAI function call → Anthropic tool_use
    given:
    - The client submits OpenAI-format functions/tools
    - The upstream is Anthropic
    when:
    - The gateway translates the request
    then:
    - Tool definitions convert to Anthropic's tool schema preserving names, descriptions and JSON schema
    - The response's tool_use blocks are translated back to OpenAI tool_calls
    - Structured output (json_mode, response_format) is preserved
  - id: AC-002
    scenario: Tool result turn
    given:
    - The conversation includes a tool_result from the client
    when:
    - The gateway forwards to the upstream
    then:
    - The tool_result is attached to the correct message in the upstream's expected shape
    - Multi-turn tool loops work identically across dialects
  api:
  - method: POST
    path: /v1/chat/completions
    request:
      body:
        tools: object[]
        tool_choice: object
    errors:
