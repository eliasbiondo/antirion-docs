      - provider_id: string
        byok_credential_id: uuid
        rpm_utilization: number
        tpm_utilization: number
        binding_layer: string
        cooldown_until: timestamp
    errors:
    - 401
    - 403
    inferred: true
  data_models:
  - Provider
  - BYOKCredential
  - ProviderRateLimit
  - ProviderRateLimitWindow
  non_functional:
  - Every phase (auth, translate, upstream, post-processing) has an explicit timeout; the pipeline is cancellation-safe
  - Additions to this phase must not breach the project performance_slo for gateway-added latency
  - Outbound limiter learns Retry-After within one request of receiving it and applies cluster-wide
- id: STORY-386
  feature: FEAT-161
  title: Alert rule on provider rate-limit pressure
  narrative:
    as_a: on-call engineer
    i_want: to create an alert rule that fires when provider rate-limit pressure crosses a threshold for a sustained window
    so_that: I can act before users see 429s
  priority: P1
  depends_on:
  - STORY-385
  acceptance_criteria:
  - id: AC-001
    scenario: Threshold alert on provider pressure
    given:
    - An AlertRule of type "provider_rate_limit_pressure" with provider_id=anthropic, threshold=90 and for_duration_s=120
    when:
    - rpm_utilization stays above 90% for 120 seconds
    then:
    - An AlertEvent is created and the configured NotificationChannels fire (see FEAT-101)
    - The event body includes binding_layer, rpm and tpm utilization and top offending keys
  - id: AC-002
    scenario: Auto-resolve on recovery
    given:
    - The alert is active
    when:
    - Utilization drops below 90% for 60 seconds
    then:
    - The AlertEvent is resolved with resolution "recovered"
  data_models:
  - AlertRule
  - AlertEvent
  - ProviderRateLimitWindow
  non_functional:
  - Every phase (auth, translate, upstream, post-processing) has an explicit timeout; the pipeline is cancellation-safe
  - Additions to this phase must not breach the project performance_slo for gateway-added latency
  - Outbound limiter learns Retry-After within one request of receiving it and applies cluster-wide
- id: STORY-387
  feature: FEAT-162
  title: Pin data residency region before any tenant data is written
  narrative:
    as_a: workspace owner on first sign-in (saas) or platform admin on first install (self_hosted)
    i_want: to pick the workspace's data residency region before any prompt, log row or derived artifact is persisted
    so_that: every byte of tenant data is bound to a compliant region from day zero and we never have to backfill-migrate a half-populated workspace
  priority: P0
  acceptance_criteria:
  - id: AC-001
    scenario: Residency picker blocks the checklist in saas mode
    given:
    - The deployment mode is saas
    - My Org has no ResidencyConfig yet
    when:
    - I land on /gateway for the first time
    then:
    - A full-screen ResidencyPicker is shown before the SetupChecklist
    - No default region is pre-selected; I must make an explicit choice
    - All write endpoints on the management API return 409 "residency_not_pinned" until a region is chosen
  - id: AC-002
    scenario: Residency pinned and checklist unblocked
    given:
    - The ResidencyPicker is shown
    when:
    - I select "eu-central-1" and confirm by typing the region code
    then:
    - A ResidencyConfig is created with region "eu-central-1" and mode "initial"
    - An AuditLog "residency.pinned" is written with actor, region and created_at
    - The ResidencyPicker closes and the SetupChecklist renders
    - All subsequent writes route to the eu-central-1 region per FEAT-130
  - id: AC-003
    scenario: self_hosted mode pins from install config
    given:
    - The deployment mode is self_hosted
    - The install config declares residency_region "on-prem-dc1"
    when:
    - The platform admin lands on /gateway for the first time
    then:
    - The ResidencyPicker renders read-only with "on-prem-dc1" selected
    - Confirming records a ResidencyConfig pinned to "on-prem-dc1" with mode "initial" and source "install_config"
    - No other region is selectable; there is no migration or change path — PATCH /api/residency and any migrate endpoint return 404
  ui:
    screens:
    - Onboarding
    components:
    - ResidencyPicker
    - ConfirmTypeToMatch
    states:
    - empty
    - saas_choice
    - self_hosted_readonly
    - submitting
    - done
  api:
  - method: POST
    path: /api/residency/initial
    request:
      body:
        region: string
        confirm_region: string
    response:
      config: ResidencyConfig
    errors:
    - 400
    - 401
    - 403
    - 409
    inferred: true
  data_models:
  - ResidencyConfig
  - Org
  - AuditLog
  non_functional:
  - No prompt, log row, derived artifact, key or setting is persisted before ResidencyConfig exists — the edge returns 409 "residency_not_pinned" for every write until then
  - Residency selection is permanent for the life of the workspace — no API surface, worker job or admin override exists that can change it. A different region requires provisioning a new workspace.
  - In saas mode no region is pre-selected to prevent an accidental wrong-region pin; the picker fails closed if the owner dismisses it
  - The picker's set of available regions in saas mode is served from the platform-operator configuration and honors the org's billing plan
